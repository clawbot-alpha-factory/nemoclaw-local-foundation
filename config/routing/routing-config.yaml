# NemoClaw Model Routing Config v4.0 - Updated 2026-03-27
# Phase 8: Full 9-alias routing system across OpenAI, Anthropic, Google
# Cost estimates at 2x real pricing for conservative tracking
# OpenAI pricing: gpt-5.4 $1.75/$14, gpt-5.4-mini $0.15/$0.60, o3 $10/$40
# Anthropic pricing: Sonnet $3/$15, Haiku $1/$5, Opus $5/$25
# Google pricing: Gemini 2.5 Pro $1.25/$10, Gemini 2.5 Flash $0.15/$0.60

providers:
  cheap_openai:
    provider: openai
    model: gpt-5.4-mini
    max_tokens: 8192
    estimated_cost_per_call: 0.0004
    notes: Default path. Classification, structured output, short tasks.

  reasoning_openai:
    provider: openai
    model: gpt-5.4
    max_tokens: 16384
    estimated_cost_per_call: 0.010
    notes: Heavy reasoning, coding, agentic tasks via OpenAI.

  reasoning_o3:
    provider: openai
    model: o3
    max_tokens: 16384
    estimated_cost_per_call: 0.060
    notes: Deep STEM reasoning, math, multi-step logic. Use sparingly — expensive.

  cheap_claude:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    max_tokens: 8192
    estimated_cost_per_call: 0.008
    notes: Moderate complexity tasks. Fast, cheap Claude. ~$0.005-0.01/call typical.

  reasoning_claude:
    provider: anthropic
    model: claude-sonnet-4-6
    max_tokens: 16384
    estimated_cost_per_call: 0.060
    notes: Complex reasoning, long context, code, synthesis. ~$0.03-0.08/call typical.

  premium_claude:
    provider: anthropic
    model: claude-opus-4-6
    max_tokens: 16384
    estimated_cost_per_call: 0.200
    notes: Highest quality Claude. EXPENSIVE — ~$0.15-0.35/call. Reserved for final production review only.

  cheap_google:
    provider: google
    model: gemini-2.5-flash
    max_tokens: 8192
    estimated_cost_per_call: 0.0004
    notes: Fast, cheap Google tasks. Strong multimodal and long context.

  reasoning_google:
    provider: google
    model: gemini-2.5-pro-preview-03-25
    max_tokens: 16384
    estimated_cost_per_call: 0.008
    notes: Google flagship. Long context, complex reasoning, multimodal.

  fallback_openai:
    provider: openai
    model: gpt-5.4-mini
    max_tokens: 8192
    estimated_cost_per_call: 0.0004
    notes: Fallback for any provider failure. Always available.

  # NVIDIA NIM — free tier (40 RPM, trial service)
  cheap_nvidia:
    provider: nvidia
    model: nvidia/nemotron-nano-9b-v2
    max_tokens: 8192
    estimated_cost_per_call: 0.0
    notes: Fast 9B hybrid Mamba-Transformer. Free NIM API. Tier 1 alternative.

  reasoning_nvidia:
    provider: nvidia
    model: nvidia/nemotron-3-nano-30b-a3b
    max_tokens: 16384
    estimated_cost_per_call: 0.0
    notes: 30B MoE (3.5B active), 1M context. Free NIM API. Tier 2/3 candidate.

routing_rules:
  # Tier 1 — Fast (single call, no review, no critical work)
  structured_short:   cheap_openai
  general_short:      cheap_openai
  vision:             cheap_google

  # Tier 2 — Moderate (single call, everyday workhorse)
  moderate:           cheap_claude
  long_document:      reasoning_google

  # Tier 3 — Advanced (chain-routed via model-rankings.yaml when task_domain set)
  complex_reasoning:  reasoning_claude
  code:               reasoning_openai
  agentic:            reasoning_claude
  deep_reasoning:     reasoning_o3

  # Tier 4 — Strategic (chain-routed via model-rankings.yaml, best-of-best)
  premium:            premium_claude
  strategic:          premium_claude

# Maps each task_class to a tier number. Tier 3/4 eligible for chain routing.
tier_mapping:
  structured_short:   1
  general_short:      1
  vision:             1
  moderate:           2
  long_document:      2
  complex_reasoning:  3
  code:               3
  agentic:            3
  deep_reasoning:     3
  premium:            4
  strategic:          4

defaults:
  default_alias: cheap_openai
  active_provider: openai
