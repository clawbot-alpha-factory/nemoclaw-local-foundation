# NemoClaw Model Routing Config v5.0 — Quality-First (2026-04-03)
# PRINCIPLE: Quality over cost. Sonnet 4.6 is the default workhorse.
# Claude Code + Codex are the best agentic executors (tier 3/4 chains).
# Mini/Haiku/Flash reserved for fallback only — never primary.
#
# Pricing (per 1M tokens: input/output):
# OpenAI:    gpt-5.4 $2.50/$15, gpt-5.4-mini $0.75/$4.50, o3 $2/$8
# Anthropic: Sonnet 4.6 $3/$15, Haiku 4.5 $1/$5, Opus 4.6 $5/$25
# Google:    Gemini 2.5 Pro $1.25/$10, Gemini 2.5 Flash $0.30/$2.50

providers:
  cheap_openai:
    provider: openai
    model: gpt-5.4-mini
    max_tokens: 8192
    estimated_cost_per_call: 0.003
    notes: Structured output, classification. Fallback tier only.

  reasoning_openai:
    provider: openai
    model: gpt-5.4
    max_tokens: 16384
    estimated_cost_per_call: 0.015
    notes: Full GPT-5.4. Fastest agent loops, strong agentic capability.

  reasoning_o3:
    provider: openai
    model: o3
    max_tokens: 16384
    estimated_cost_per_call: 0.060
    notes: Deep STEM reasoning, math, multi-step logic.

  cheap_claude:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    max_tokens: 8192
    estimated_cost_per_call: 0.005
    notes: Fallback only. Not used for primary routing.

  reasoning_claude:
    provider: anthropic
    model: claude-sonnet-4-6
    max_tokens: 16384
    estimated_cost_per_call: 0.060
    notes: PRIMARY WORKHORSE. #1 coding model, best reasoning, best synthesis.

  premium_claude:
    provider: anthropic
    model: claude-opus-4-6
    max_tokens: 16384
    estimated_cost_per_call: 0.200
    notes: Highest quality. Architecture, strategic decisions, final review.

  cheap_google:
    provider: google
    model: gemini-2.5-flash
    max_tokens: 8192
    estimated_cost_per_call: 0.002
    notes: Vision, multimodal, long context. Best value for these tasks.

  reasoning_google:
    provider: google
    model: gemini-2.5-pro
    max_tokens: 16384
    estimated_cost_per_call: 0.010
    notes: 1M context window. Long document processing, multimodal pro.

  fallback_openai:
    provider: openai
    model: gpt-5.4-mini
    max_tokens: 8192
    estimated_cost_per_call: 0.003
    notes: Fallback for any provider failure.

  fallback_nvidia:
    provider: nvidia
    model: nvidia/nvidia-nemotron-nano-9b-v2
    max_tokens: 16384
    estimated_cost_per_call: 0.0
    notes: Free fallback when all budgets exhausted. 40 RPM limit.

  cheap_nvidia:
    provider: nvidia
    model: nvidia/nvidia-nemotron-nano-9b-v2
    max_tokens: 16384
    estimated_cost_per_call: 0.0
    notes: Free tier fallback only.

  reasoning_nvidia:
    provider: nvidia
    model: nvidia/nemotron-3-nano-30b-a3b
    max_tokens: 32768
    estimated_cost_per_call: 0.0
    notes: 30B MoE, 1M context. Free fallback for tier 2/3.

routing_rules:
  # Tier 1 — Fast but capable (Sonnet for general, mini for structured only)
  structured_short:   cheap_openai        # gpt-5.4-mini OK for classification/JSON
  general_short:      reasoning_claude    # Sonnet 4.6 — quality matters here
  vision:             cheap_google        # Gemini Flash — best multimodal value

  # Tier 2 — Workhorse (Sonnet everywhere)
  moderate:           reasoning_claude    # Sonnet 4.6 — the default for real work
  long_document:      reasoning_google    # Gemini Pro — 1M context window

  # Tier 3 — Advanced (chain-routed + Claude Code/Codex for agentic)
  complex_reasoning:  reasoning_claude    # Sonnet 4.6 — top reasoning
  code:               reasoning_claude    # Sonnet 4.6 — #1 coding model (benchmarks)
  agentic:            reasoning_openai    # GPT-5.4 — fastest for agent loops
  deep_reasoning:     reasoning_o3        # o3 — purpose-built for STEM/logic

  # Tier 4 — Strategic (Opus + chain routing with Claude Code/Codex executors)
  premium:            premium_claude      # Opus 4.6 — best quality
  strategic:          premium_claude      # Opus 4.6 — best quality

tier_mapping:
  structured_short:   1
  general_short:      1
  vision:             1
  moderate:           2
  long_document:      2
  complex_reasoning:  3
  code:               3
  agentic:            3
  deep_reasoning:     3
  premium:            4
  strategic:          4

defaults:
  default_alias: reasoning_claude   # Sonnet 4.6 is the default — quality first
  active_provider: anthropic
  fallback_chain:
    - fallback_openai    # gpt-5.4-mini if Anthropic fails
    - fallback_nvidia    # Free tier if both fail
