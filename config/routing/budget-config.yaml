# NemoClaw Budget Config v3.0 - Updated 2026-03-27
# Phase 8: Three providers — OpenAI, Anthropic, Google
budgets:
  anthropic:
    total_usd: 30.00
    tracking: cumulative_across_sessions
    threshold_warn: 0.90
    threshold_hard_stop: 1.00
    warn_message: "YOU HIT 90% OF YOUR BUDGET"
    exhausted_message: "PROVIDER BUDGET EXHAUSTED — SWITCHED TO FALLBACK"
    log_to_file: true
    log_to_terminal: true
  openai:
    total_usd: 30.00
    tracking: cumulative_across_sessions
    threshold_warn: 0.90
    threshold_hard_stop: 1.00
    warn_message: "YOU HIT 90% OF YOUR BUDGET"
    exhausted_message: "PROVIDER BUDGET EXHAUSTED — SWITCHED TO FALLBACK"
    log_to_file: true
    log_to_terminal: true
  google:
    total_usd: 30.00
    tracking: cumulative_across_sessions
    threshold_warn: 0.90
    threshold_hard_stop: 1.00
    warn_message: "YOU HIT 90% OF YOUR BUDGET"
    exhausted_message: "PROVIDER BUDGET EXHAUSTED — SWITCHED TO FALLBACK"
    log_to_file: true
    log_to_terminal: true
  nvidia:
    total_usd: 0.00
    tracking: cumulative_across_sessions
    threshold_warn: 0.90
    threshold_hard_stop: 1.00
    warn_message: "NVIDIA FREE TIER CREDITS LOW"
    exhausted_message: "NVIDIA FREE TIER EXHAUSTED — SWITCHED TO FALLBACK"
    log_to_file: true
    log_to_terminal: true
    notes: "Free tier (5000 credits, 40 RPM). $0 budget = free tier only."
log:
  path: ~/.nemoclaw/logs/provider-usage.jsonl
  fields:
    - timestamp
    - task_class
    - alias_selected
    - model_used
    - provider
    - estimated_cost_usd
    - provider_cumulative_spend_usd
    - provider_budget_remaining_usd
    - provider_budget_pct_used
    - fallback_used
    - override
