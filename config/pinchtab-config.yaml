pinchtab:
  server_url: "http://localhost:9867"
  default_mode: headless
  max_instances: 4
  memory_limit_mb: 1024  # total across all instances

  profiles:
    strategy_lead: {headless: false, persist: true}
    growth_revenue_lead: {headless: true, persist: true}
    product_architect: {headless: true, persist: true}
    narrative_content_lead: {headless: true, persist: true}
    operations_lead: {headless: true, persist: true}
    engineering_lead: {headless: true, persist: true}
    executive_operator: {headless: false, persist: false}
    sales_outreach_lead: {headless: true, persist: true}
    marketing_campaigns_lead: {headless: true, persist: true}
    client_success_lead: {headless: true, persist: true}
    social_media_lead: {headless: true, persist: true}

  rate_limits:
    navigations_per_hour: 100
    clicks_per_task: 50
    text_extractions_per_hour: 200
    screenshots_per_hour: 50

  safety:
    blocked_domains:
      - "*.bank.*"
      - "*.gov.*"
      - "pay.*.com"
      - "*.stripe.com"
      - "*.paypal.com"
    require_screenshot_before_submit: true
    require_approval_for_first_login: true
    max_eval_js_per_task: 5

  scheduler:
    enabled: true
    strategy: "fair-fifo"
    max_queue_size: 1000
    max_per_agent: 100
    max_inflight: 20
    max_per_agent_inflight: 10
    result_ttl_sec: 300
    worker_count: 4
