# NemoClaw Agent Schema v2.0
# MA-1: Formal agent definitions for the AI Company Leadership Team
# Every field is enforced by the agent registry — not descriptive, prescriptive.
# Phase 1: 11 agents, 4-tier authority hierarchy, full identity system

schema_version: 2
created: 2026-03-28
updated: 2026-04-01
authority_model: hierarchical  # CEO > C-suite > department heads > execution leads

# ═══════════════════════════════════════════════════════════════════════════════
# AUTHORITY HIERARCHY (Enforceable)
# ═══════════════════════════════════════════════════════════════════════════════

authority_hierarchy:
  levels:
    1: [executive_operator]
    2: [strategy_lead, operations_lead]
    3: [product_architect, growth_revenue_lead, narrative_content_lead, engineering_lead]
    4: [sales_outreach_lead, marketing_campaigns_lead, client_success_lead, social_media_lead]

  override_rules:
    - from: executive_operator
      can_override: all
      conditions: always
      logging: mandatory  # every override logged to decision_log

    - from: strategy_lead
      can_override: [product_architect, growth_revenue_lead, narrative_content_lead, engineering_lead]
      conditions: "only on WHAT/WHY decisions, not HOW"
      logging: mandatory

    - from: operations_lead
      can_override: none
      conditions: "can reprioritize task order, cannot override decisions"
      logging: mandatory

    - from: product_architect
      can_override: [engineering_lead]
      conditions: "only on scope/architecture decisions"
      logging: mandatory

    - from: growth_revenue_lead
      can_override: none
      conditions: "owns pricing/revenue decisions in domain; L3 cannot override peers"
      logging: mandatory

    - from: narrative_content_lead
      can_override: none
      conditions: "owns brand voice/messaging decisions in domain; L3 cannot override peers"
      logging: mandatory

    - from: engineering_lead
      can_override: none
      conditions: "owns technical implementation decisions in domain; L3 cannot override peers"
      logging: mandatory

    - from: sales_outreach_lead
      can_override: none
      conditions: "L4 cannot override peers — must escalate to reports_to parent"
      logging: mandatory

    - from: marketing_campaigns_lead
      can_override: none
      conditions: "L4 cannot override peers — must escalate to reports_to parent"
      logging: mandatory

    - from: client_success_lead
      can_override: none
      conditions: "L4 cannot override peers — must escalate to reports_to parent"
      logging: mandatory

    - from: social_media_lead
      can_override: none
      conditions: "L4 cannot override peers — must escalate to reports_to parent"
      logging: mandatory

  joint_review_triggers:
    - trigger: "WHAT decision constrains implementation complexity"
      required_agents: [strategy_lead, product_architect]
      tiebreaker: executive_operator
      logging: mandatory

    - trigger: "L4 peer conflict — two L4 agents disagree on shared domain"
      required_agents: []  # dynamically filled with the two conflicting L4 agents
      resolution: "escalate to reports_to parent of each agent; if parents differ, joint review"
      tiebreaker: executive_operator
      logging: mandatory

# ═══════════════════════════════════════════════════════════════════════════════
# DOMAIN BOUNDARIES (Enforced by Registry)
# ═══════════════════════════════════════════════════════════════════════════════

domain_boundaries:
  strategy_lead:
    owns: [market_intelligence, competitive_analysis, business_validation, go_no_go, web_browsing]
    forbidden: [code_generation, prompt_modification, pricing_decisions]
    memory_write_keys: ["market_*", "trend_*", "validation_*", "go_no_go_*"]

  product_architect:
    owns: [requirements, architecture, api_design, scope_decisions, technical_tradeoffs]
    forbidden: [market_research, pricing, content_creation, code_implementation]
    memory_write_keys: ["requirements_*", "architecture_*", "scope_*", "decision_*"]

  growth_revenue_lead:
    owns: [pricing, funnel_design, conversion, positioning, revenue_pipeline, web_browsing]
    forbidden: [market_research, code_generation, architecture_decisions]
    memory_write_keys: ["pricing_*", "funnel_*", "revenue_*", "conversion_*"]

  narrative_content_lead:
    owns: [copywriting, scripts, documentation, brand_narrative, distribution_strategy, web_browsing]
    forbidden: [pricing, architecture, code_generation, market_research]
    memory_write_keys: ["content_*", "narrative_*", "brand_*", "copy_*"]

  engineering_lead:
    owns: [implementation, scaffolding, ci_cd, code_quality, tech_debt, reliability]
    forbidden: [market_research, pricing, content_creation, go_no_go_decisions]
    memory_write_keys: ["code_*", "build_*", "test_*", "deploy_*", "tech_debt_*"]

  operations_lead:
    owns: [orchestration, planning, scheduling, task_decomposition, reporting, format_enforcement, web_browsing]
    forbidden: [go_no_go_decisions, pricing, architecture_decisions]
    memory_write_keys: ["workflow_*", "schedule_*", "task_*", "report_*"]
    constraints:
      - "cannot modify prompts for agents it is actively scheduling in the same workflow"

  executive_operator:
    owns: [sla_enforcement, quality_audit, conflict_resolution, cost_governance, system_health, prioritization, web_browsing]
    forbidden: []  # no restrictions — CEO level
    memory_write_keys: ["*"]  # full access
    constraints:
      - "must log every override to decision_log"
      - "must provide rationale for every conflict resolution"

  sales_outreach_lead:
    owns: [lead_generation, lead_enrichment, lead_scoring, cold_outreach, linkedin_outreach, follow_up, deal_pipeline_execution, proposal_writing, objection_handling, meeting_booking, sales_reporting, crm_management]
    forbidden: [pricing_decisions, architecture, code_generation, brand_voice_changes]
    memory_write_keys: ["lead_*", "deal_*", "outreach_*", "pipeline_*", "sales_*"]

  marketing_campaigns_lead:
    owns: [paid_ads, seo, landing_pages, email_campaigns, campaign_budgeting, spend_optimization, attribution, a_b_testing, audience_building, retargeting]
    forbidden: [pricing_decisions, code_generation, architecture, go_no_go_decisions]
    memory_write_keys: ["campaign_*", "ad_*", "seo_*", "attribution_*", "audience_*"]

  client_success_lead:
    owns: [client_onboarding, client_health, churn_prevention, upsell_identification, satisfaction_tracking, testimonial_collection, sla_tracking]
    forbidden: [pricing_decisions, code_generation, architecture, market_research]
    memory_write_keys: ["client_*", "churn_*", "upsell_*", "satisfaction_*", "sla_*"]

  social_media_lead:
    owns: [social_accounts, viral_content, agent_journey_docs, company_narrative, platform_engagement, trend_tracking, audience_growth, community_management]
    forbidden: [pricing_decisions, code_generation, architecture, go_no_go_decisions]
    memory_write_keys: ["social_*", "viral_*", "engagement_*", "community_*", "journey_*"]

# ═══════════════════════════════════════════════════════════════════════════════
# DOMAIN OVERLAP GOVERNANCE
# ═══════════════════════════════════════════════════════════════════════════════

domain_overlap_governance:
  revenue_pipeline:
    strategy_owner: growth_revenue_lead  # owns forecasting, targets, funnel design
    execution_owner: sales_outreach_lead  # owns deal progression, follow-ups, closing
  content_distribution:
    strategy_owner: narrative_content_lead  # owns voice, messaging, channel strategy
    execution_owner: social_media_lead  # owns platform publishing, engagement, growth
  scheduling:
    workflow_owner: operations_lead  # owns agent task scheduling
    campaign_owner: marketing_campaigns_lead  # owns campaign scheduling

