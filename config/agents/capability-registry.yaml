# NemoClaw Capability Registry v2.0
# MA-1: Explicit skill-to-agent mapping with fallbacks and contracts

schema_version: 2
created: 2026-03-28
updated: 2026-04-01

# ═══════════════════════════════════════════════════════════════════════════════
# CAPABILITY DEFINITIONS
# Each capability maps to: owning agent, backing skill, fallback, I/O contract
# ═══════════════════════════════════════════════════════════════════════════════

capabilities:

  # ── Strategy Lead (Nadia) ──────────────────────────────────────────────────
  market_research:
    owned_by: strategy_lead
    skill: e12-market-research-analyst
    fallback_agent: null  # no fallback — only strategy researches
    requires_inputs: [research_topic, industry_context, specific_questions, known_data, research_depth]
    produces_outputs: [market_overview, segmentation, trends, recommendations]
    memory_keys_written: [market_overview, market_segments, market_trends]

  tech_trend_scan:
    owned_by: strategy_lead
    skill: e12-tech-trend-scanner
    fallback_agent: null
    requires_inputs: [technology_domain, industry_context, time_horizon, known_technologies, specific_focus, scan_depth]
    produces_outputs: [trend_report, maturity_classifications, disruption_vectors]
    memory_keys_written: [tech_trends, disruption_vectors, maturity_map]

  competitive_intelligence:
    owned_by: strategy_lead
    skill: e08-comp-intel-synth
    fallback_agent: null
    requires_inputs: [competitor_data, focus_company, industry_context, analysis_priorities, report_depth]
    produces_outputs: [competitive_analysis, positioning_map, strategic_recommendations]
    memory_keys_written: [competitive_landscape, positioning_gaps]

  business_validation:
    owned_by: strategy_lead
    skill: j36-biz-idea-validator
    fallback_agent: null
    requires_inputs: [business_idea, target_market, competitive_landscape, scope, revenue_model_hints, known_constraints]
    produces_outputs: [validation_report, go_no_go_recommendation]
    memory_keys_written: [validation_result, go_no_go_decision]

