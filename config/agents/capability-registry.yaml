# ═══════════════════════════════════════════════════════════════════════════════
# CAPABILITY DEFINITIONS
# Each capability maps to: owning agent, backing skill, fallback, I/O contract
# ═══════════════════════════════════════════════════════════════════════════════

capabilities:

  # ── Strategy Lead (Nadia) ──────────────────────────────────────────────────
  market_research:
    owned_by: strategy_lead
    skill: e12-market-research-analyst
    fallback_agent: null  # no fallback — only strategy researches
    requires_inputs: [research_topic, industry_context, specific_questions, known_data, research_depth]
    produces_outputs: [market_overview, segmentation, trends, recommendations]
    memory_keys_written: [market_overview, market_segments, market_trends]

  tech_trend_scan:
    owned_by: strategy_lead
    skill: e12-tech-trend-scanner
    fallback_agent: null
    requires_inputs: [technology_domain, industry_context, time_horizon, known_technologies, specific_focus, scan_depth]
    produces_outputs: [trend_report, maturity_classifications, disruption_vectors]
    memory_keys_written: [tech_trends, disruption_vectors, maturity_map]

  competitive_intelligence:
    owned_by: strategy_lead
    skill: e08-comp-intel-synth
    fallback_agent: null
    requires_inputs: [competitor_data, focus_company, industry_context, analysis_priorities, report_depth]
    produces_outputs: [competitive_analysis, positioning_map, strategic_recommendations]
    memory_keys_written: [competitive_landscape, positioning_gaps]

  business_validation:
    owned_by: strategy_lead
    skill: j36-biz-idea-validator
    fallback_agent: null
    requires_inputs: [business_idea, target_market, competitive_landscape, scope, revenue_model_hints, known_constraints]
    produces_outputs: [validation_report, go_no_go_recommendation]
    memory_keys_written: [validation_result, go_no_go_decision]

  mvp_scoping:
    owned_by: strategy_lead
    skill: j36-mvp-scope-definer
    fallback_agent: product_architect  # product can also scope
    requires_inputs: [product_idea, target_audience, resource_constraints, timeline, scope_mode, domain_context, existing_assets]
    produces_outputs: [mvp_scope, feature_priorities, launch_criteria]
    memory_keys_written: [mvp_scope, feature_list, launch_criteria]

  comment_signal_scraping:
    owned_by: strategy_lead
    skill: int-01-comment-signal-scraper
    requires_inputs: [targets, platforms]
    produces_outputs: [signal_report, sentiment_data]
    tools: [apify_bridge, pinchtab]

  demand_pattern_analysis:
    owned_by: strategy_lead
    skill: int-02-demand-pattern-analyzer
    requires_inputs: [raw_signals, niche]
    produces_outputs: [demand_patterns, trend_forecast]

  opportunity_generation:
    owned_by: strategy_lead
    skill: int-03-opportunity-offer-generator
    requires_inputs: [demand_insights, capabilities]
    produces_outputs: [opportunity_briefs, offer_concepts]

  reality_check:
    owned_by: strategy_lead
    skill: int-04-reality-check-engine
    requires_inputs: [opportunity_data, historical_results]
    produces_outputs: [reality_check_report, risk_assessment]

  cross_platform_scraping:
    owned_by: strategy_lead
    skill: int-05-cross-platform-scraper
    requires_inputs: [targets, platforms]
    produces_outputs: [scraped_data, platform_insights]
    tools: [apify_bridge, pinchtab]

  experiment_decisions:
    owned_by: strategy_lead
    skill: rev-25-experiment-decision-engine
    requires_inputs: [experiment_data]
    produces_outputs: [kill_scale_decision, rationale]

  system_learning:
    owned_by: strategy_lead
    skill: rev-19-system-learning-engine
    fallback_agent: executive_operator
    requires_inputs: [system_performance_data, learning_period]
    produces_outputs: [learning_insights, priority_adjustments]

  # ── Product Architect ─────────────────────────────────────────────────────
  product_requirements:
    owned_by: product_architect
    skill: f09-product-req-writer
    fallback_agent: null
    requires_inputs: [product_idea, target_audience, business_context, constraints, scope_level]
    produces_outputs: [prd, user_stories, acceptance_criteria, nfrs]
    memory_keys_written: [requirements, user_stories, scope_boundaries]

  architecture_spec:
    owned_by: product_architect
    skill: a01-arch-spec-writer
    fallback_agent: engineering_lead  # eng can also architect
    requires_inputs: [subsystem_name, subsystem_concept, boundaries, integration_context, constraints]
    produces_outputs: [architecture_doc, component_breakdown, integration_points]
    memory_keys_written: [architecture, components, integrations]

  system_context_map:
    owned_by: product_architect
    skill: a01-sys-context-mapper
    fallback_agent: null
    requires_inputs: [system_name, system_description, known_integrations, domain_context, output_detail_level]
    produces_outputs: [context_map, external_actors, data_flows]
    memory_keys_written: [system_context, actors, data_flows]

  api_design:
    owned_by: product_architect
    skill: a01-api-surface-designer
    fallback_agent: engineering_lead
    requires_inputs: [service_description, target_consumers, design_constraints, api_style, output_format]
    produces_outputs: [api_spec, endpoint_inventory, auth_model]
    memory_keys_written: [api_spec, endpoints]

  decision_record:
    owned_by: product_architect
    skill: c07-decision-record-writer
    fallback_agent: operations_lead
    requires_inputs: [decision_title, decision_context, options_considered, chosen_option, decision_drivers, status, compliance_domains, review_date]
    produces_outputs: [adr_document, consequences, review_date]
    memory_keys_written: [decision_record]

  # ── Growth & Revenue Lead (Omar) ──────────────────────────────────────────
  pricing_strategy:
    owned_by: growth_revenue_lead
    skill: f09-pricing-strategist
    fallback_agent: null
    requires_inputs: [product_description, target_market, cost_structure, competitive_context, pricing_goals, scope]
    produces_outputs: [pricing_model, revenue_projections, pricing_tiers]
    memory_keys_written: [pricing_model, revenue_projections, pricing_tiers]

  revenue_attribution:
    owned_by: growth_revenue_lead
    skill: rev-03-revenue-attribution-analyzer
    requires_inputs: [revenue_data, period]
    produces_outputs: [attribution_report, channel_roi]

  offer_optimization:
    owned_by: growth_revenue_lead
    skill: rev-04-offer-optimization-engine
    requires_inputs: [offer_performance_data, market_context]
    produces_outputs: [optimized_offers, pricing_recommendations]

  funnel_analysis:
    owned_by: growth_revenue_lead
    skill: rev-05-funnel-conversion-analyzer
    requires_inputs: [funnel_data, funnel_type]
    produces_outputs: [funnel_report, bottleneck_analysis]

  revenue_orchestration:
    owned_by: growth_revenue_lead
    skill: rev-06-revenue-orchestrator
    requires_inputs: [pipeline_state, available_budget]
    produces_outputs: [revenue_plan, channel_allocation]

  service_packaging:
    owned_by: growth_revenue_lead
    skill: rev-08-agentic-service-packager
    requires_inputs: [capability_description, client_industry]
    produces_outputs: [service_packages, pricing_tiers]

  payment_execution:
    owned_by: growth_revenue_lead
    skill: rev-09-payment-execution-engine
    requires_inputs: [invoice_data, payment_provider]
    produces_outputs: [payment_confirmation, receipt]

  lead_sourcing:
    owned_by: growth_revenue_lead
    skill: rev-10-lead-source-engine
    requires_inputs: [target_icp, sources]
    produces_outputs: [lead_list, source_quality_scores]

  risk_allocation:
    owned_by: growth_revenue_lead
    skill: rev-12-risk-capital-allocator
    requires_inputs: [portfolio_state, risk_tolerance]
    produces_outputs: [allocation_plan, risk_report]

  live_experiments:
    owned_by: growth_revenue_lead
    skill: rev-13-live-experiment-runner
    requires_inputs: [experiment_spec, confidence_threshold]
    produces_outputs: [experiment_results, statistical_significance]

  revenue_loop_enforcement:
    owned_by: growth_revenue_lead
    skill: rev-14-revenue-loop-enforcer
    fallback_agent: operations_lead
    requires_inputs: [active_opportunities, loop_stages]
    produces_outputs: [enforcement_actions, gap_analysis]

  playbook_memory:
    owned_by: growth_revenue_lead
    skill: rev-15-playbook-memory-engine
    requires_inputs: [campaign_results, existing_playbooks]
    produces_outputs: [best_playbooks, win_patterns]

  speed_to_revenue:
    owned_by: growth_revenue_lead
    skill: rev-16-speed-to-revenue-optimizer
    requires_inputs: [current_state, urgency]
    produces_outputs: [optimization_plan, time_to_revenue_estimate]

  demand_mining:
    owned_by: growth_revenue_lead
    skill: rev-17-demand-signal-miner
    requires_inputs: [target_niches, platforms]
    produces_outputs: [demand_signals, opportunity_scores]

  instant_offers:
    owned_by: growth_revenue_lead
    skill: rev-18-instant-offer-launcher
    requires_inputs: [demand_signal, speed_mode]
    produces_outputs: [launched_offer, tracking_data]

  sales_forecasting:
    owned_by: growth_revenue_lead
    skill: k43-sales-forecast-modeler
    requires_inputs: [pipeline_summary, forecast_horizon]
    produces_outputs: [forecast_report, confidence_intervals]

  contract_drafting:
    owned_by: growth_revenue_lead
    skill: biz-02-contract-drafter
    requires_inputs: [proposal_summary, jurisdiction]
    produces_outputs: [contract_draft, key_terms]

  invoice_generation:
    owned_by: growth_revenue_lead
    skill: biz-03-invoice-generator
    requires_inputs: [contract_details, payment_method]
    produces_outputs: [invoice, payment_instructions]

  affiliate_management:
    owned_by: growth_revenue_lead
    skill: scl-01-affiliate-program-engine
    requires_inputs: [product_context, commission_model]
    produces_outputs: [affiliate_program, partner_materials]

  partnership_proposals:
    owned_by: growth_revenue_lead
    skill: scl-02-partnership-proposal-writer
    requires_inputs: [partner_info, partnership_type]
    produces_outputs: [proposal_doc, partnership_terms]

  webinar_funnels:
    owned_by: growth_revenue_lead
    skill: scl-03-webinar-funnel-builder
    requires_inputs: [webinar_topic, target_audience]
    produces_outputs: [funnel_design, registration_pages]

  podcast_pitches:
    owned_by: growth_revenue_lead
    skill: scl-04-podcast-guest-pitch-writer
    requires_inputs: [podcast_info, expertise]
    produces_outputs: [pitch_emails, talking_points]

  community_growth:
    owned_by: growth_revenue_lead
    skill: scl-05-community-growth-engine
    requires_inputs: [community_vision, platform]
    produces_outputs: [growth_strategy, engagement_plan]

  revenue_dashboard:
    owned_by: growth_revenue_lead
    skill: scl-08-revenue-dashboard-generator
    fallback_agent: operations_lead
    requires_inputs: [revenue_data, report_type]
    produces_outputs: [dashboard_config, visualization_specs]

  niche_domination:
    owned_by: growth_revenue_lead
    skill: scl-09-niche-domination-engine
    requires_inputs: [niche_definition, timeline]
    produces_outputs: [domination_strategy, content_plan]

  micro_saas:
    owned_by: growth_revenue_lead
    skill: scl-10-micro-saas-generator
    requires_inputs: [problem_pattern, build_constraint]
    produces_outputs: [saas_concept, mvp_spec, revenue_model]

  # ── Narrative & Content Lead (Yasmin) ──────────────────────────────────────
  copywriting:
    owned_by: narrative_content_lead
    skill: d11-copywriting-specialist
    fallback_agent: null
    requires_inputs: [copy_brief, target_audience, copy_format, brand_voice, reference_material, copy_length]
    produces_outputs: [copy_content, cta, headline]
    memory_keys_written: [copy_content, brand_messaging]

  video_scripting:
    owned_by: narrative_content_lead
    skill: d11-video-script-writer
    fallback_agent: null
    requires_inputs: [script_brief, target_audience, video_format, brand_voice, reference_material, video_duration_target]
    produces_outputs: [video_script, scene_breakdown, cta]
    memory_keys_written: [video_script]

  api_documentation:
    owned_by: narrative_content_lead
    skill: c07-api-doc-gen
    fallback_agent: engineering_lead
    requires_inputs: [api_specification, target_audience, api_name, base_url, authentication_type, include_sdk_patterns, documentation_depth]
    produces_outputs: [api_docs, quick_start, error_reference]
    memory_keys_written: [api_documentation]

  kb_article:
    owned_by: narrative_content_lead
    skill: e08-kb-article-writer
    fallback_agent: null
    requires_inputs: [topic, article_type, target_audience, source_material, related_article_hints, tone]
    produces_outputs: [kb_article, troubleshooting_tips, metadata_tags]
    memory_keys_written: [kb_article]

  meeting_summary:
    owned_by: narrative_content_lead
    skill: e08-meeting-summary-gen
    fallback_agent: operations_lead
    requires_inputs: [transcript, attendees, meeting_type, meeting_title, meeting_date, focus_areas]
    produces_outputs: [summary, action_items, decisions, open_questions]
    memory_keys_written: [meeting_decisions, action_items]

  tone_calibration:
    owned_by: narrative_content_lead
    skill: i35-tone-calibrator
    fallback_agent: null
    requires_inputs: [input_text, target_tone, preserve_structure, intensity]
    produces_outputs: [calibrated_text, tone_analysis]
    memory_keys_written: []  # utility — no memory footprint

  blog_writing:
    owned_by: narrative_content_lead
    skill: k48-blog-post-writer
    requires_inputs: [topic, target_audience]
    produces_outputs: [blog_post, meta_description]

