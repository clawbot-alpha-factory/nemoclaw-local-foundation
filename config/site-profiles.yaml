# Per-site authentication profiles for NemoClaw browser autonomy.
# Used by AuthFlowHandler (login) and SignupHandler (account creation).
# Selectors may need updating as sites change their UI.
# Full autonomy mode (2026-04-02): no approval gates, agents act freely.

sites:
  heygen.com:
    login_url: https://app.heygen.com/login
    signup_url: https://app.heygen.com/signup
    signup_method: google_oauth
    auth_methods: [google_oauth, password]
    selectors:
      email_input: "input[type='email']"
      password_input: "input[type='password']"
      google_button: "button:has-text('Google'), [data-provider='google']"
      submit: "button[type='submit']"
    post_login_check: "nav, [data-testid='sidebar']"
    post_signup_check: "nav, [data-testid='sidebar']"
    email_verification_required: false
    session_indicator: cookie:heygen_session

  instantly.ai:
    login_url: https://app.instantly.ai/auth/login
    signup_url: https://app.instantly.ai/auth/signup
    signup_method: form
    auth_methods: [password]
    selectors:
      email_input: "input[name='email'], input[type='email']"
      password_input: "input[name='password'], input[type='password']"
      submit: "button[type='submit']"
    post_login_check: "[data-testid='dashboard'], .dashboard"
    post_signup_check: "[data-testid='dashboard'], .dashboard"
    email_verification_required: true

  apollo.io:
    login_url: https://app.apollo.io/#/login
    signup_url: https://app.apollo.io/#/signup
    signup_method: google_oauth
    auth_methods: [google_oauth, password]
    selectors:
      email_input: "input[name='email'], input[type='email']"
      password_input: "input[name='password'], input[type='password']"
      google_button: "button:has-text('Google'), .google-login-btn"
      submit: "button[type='submit']"
    post_login_check: ".app-container, [data-testid='home']"
    post_signup_check: ".app-container, [data-testid='home']"
    email_verification_required: true

  hubspot.com:
    login_url: https://app.hubspot.com/login
    signup_url: https://app.hubspot.com/signup
    signup_method: google_oauth
    auth_methods: [google_oauth, password]
    selectors:
      email_input: "#username, input[name='email']"
      password_input: "#password, input[name='password']"
      google_button: "#google-signup, button:has-text('Google')"
      submit: "#loginBtn, button[type='submit']"
    post_login_check: ".nav-left, [data-test-id='nav']"
    post_signup_check: ".nav-left, [data-test-id='nav']"
    email_verification_required: true

  resend.com:
    login_url: https://resend.com/login
    signup_url: https://resend.com/signup
    signup_method: google_oauth
    auth_methods: [google_oauth]
    selectors:
      google_button: "button:has-text('Google'), [data-provider='google']"
    post_login_check: "[data-testid='dashboard']"
    post_signup_check: "[data-testid='dashboard']"
    email_verification_required: false

  lemonsqueezy.com:
    login_url: https://app.lemonsqueezy.com/login
    signup_url: https://app.lemonsqueezy.com/register
    signup_method: form
    auth_methods: [google_oauth, password]
    selectors:
      email_input: "input[type='email']"
      password_input: "input[type='password']"
      google_button: "button:has-text('Google')"
      submit: "button[type='submit']"
    post_login_check: ".dashboard, [data-page='dashboard']"
    post_signup_check: ".dashboard, [data-page='dashboard']"
    email_verification_required: true

  linkedin.com:
    login_url: https://www.linkedin.com/login
    signup_url: https://www.linkedin.com/signup
    signup_method: form
    auth_methods: [password]
    selectors:
      email_input: "#username, input[name='email-or-phone']"
      password_input: "#password, input[name='password']"
      submit: ".login__form_action_container button, button[type='submit']"
    signup_selectors:
      first_name: "#first-name, input[name='firstName']"
      last_name: "#last-name, input[name='lastName']"
    post_login_check: ".global-nav, [data-test-id='nav-bar']"
    post_signup_check: ".global-nav, [data-test-id='nav-bar']"
    email_verification_required: true

  instagram.com:
    login_url: https://www.instagram.com/accounts/login/
    signup_url: https://www.instagram.com/accounts/emailsignup/
    signup_method: form
    auth_methods: [password]
    selectors:
      email_input: "input[name='username'], input[name='emailOrPhone']"
      password_input: "input[name='password']"
      submit: "button[type='submit']"
    signup_selectors:
      full_name: "input[name='fullName']"
      username: "input[name='username']"
    post_login_check: "nav, [data-testid='user-avatar']"
    post_signup_check: "nav, [data-testid='user-avatar']"
    email_verification_required: true

  youtube.com:
    login_url: https://accounts.google.com
    signup_url: https://accounts.google.com/signup
    signup_method: google_oauth
    auth_methods: [google_oauth]
    selectors:
      google_button: null
    post_login_check: "ytd-app, #content"
    post_signup_check: "ytd-app, #content"
    email_verification_required: false

  tiktok.com:
    login_url: https://www.tiktok.com/login/phone-or-email/email
    signup_url: https://www.tiktok.com/signup/phone-or-email/email
    signup_method: form
    auth_methods: [password]
    selectors:
      email_input: "input[name='username'], input[placeholder*='email']"
      password_input: "input[type='password']"
      submit: "button[type='submit']"
    post_login_check: "[data-e2e='profile-icon']"
    post_signup_check: "[data-e2e='profile-icon']"
    email_verification_required: true

  canva.com:
    login_url: https://www.canva.com/login
    signup_url: https://www.canva.com/signup
    signup_method: google_oauth
    auth_methods: [google_oauth, password]
    selectors:
      email_input: "input[name='email']"
      password_input: "input[name='password']"
      google_button: "button:has-text('Google'), [data-testid='google-button']"
      submit: "button[type='submit']"
    post_login_check: "[data-testid='home-page']"
    post_signup_check: "[data-testid='home-page']"
    email_verification_required: false

  meta.com:
    login_url: https://business.facebook.com
    signup_url: https://business.facebook.com/overview
    signup_method: form
    auth_methods: [password]
    selectors:
      email_input: "#email"
      password_input: "#pass"
      submit: "#loginbutton, button[name='login']"
    post_login_check: "[data-testid='biz-home']"
    post_signup_check: "[data-testid='biz-home']"
    email_verification_required: true

  google-ads:
    login_url: https://ads.google.com
    signup_url: https://ads.google.com/home/
    signup_method: google_oauth
    auth_methods: [google_oauth]
    selectors:
      google_button: null
    post_login_check: ".aw-overview-root, [data-test-id='overview']"
    post_signup_check: ".aw-overview-root, [data-test-id='overview']"
    email_verification_required: false

# Template for adding new sites:
# domain.com:
#   login_url: https://...
#   signup_url: https://...
#   signup_method: form | google_oauth
#   auth_methods: [password|google_oauth|totp]
#   selectors:
#     email_input: "css selector"
#     password_input: "css selector"
#     google_button: "css selector" (null for direct Google login)
#     submit: "css selector"
#   signup_selectors:  # optional, for sites with extra signup fields
#     first_name: "css selector"
#     last_name: "css selector"
#     username: "css selector"
#   post_login_check: "css selector for logged-in state"
#   post_signup_check: "css selector for account created"
#   email_verification_required: true|false
#   session_indicator: cookie:name (optional)
