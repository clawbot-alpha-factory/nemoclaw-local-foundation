# Per-agent web capabilities for NemoClaw Browser Autonomy Layer
# Integrates with MA-19 access control

agent_permissions:
  strategy_lead:
    allowed_actions: [navigate, click, fill, screenshot, autonomous_task, login]
    allowed_domains: ["*"]  # Strategic oversight — all domains
    can_create_accounts: true
    can_make_purchases: false
    max_autonomous_steps: 100

  growth_revenue_lead:
    allowed_actions: [navigate, click, fill, login, autonomous_task, upload_file]
    allowed_domains:
      - "*.instantly.ai"
      - "*.apollo.io"
      - "*.hubspot.com"
      - "*.lemonsqueezy.com"
      - "*.stripe.com"
    can_create_accounts: true
    can_make_purchases: false
    max_autonomous_steps: 100

  product_architect:
    allowed_actions: [navigate, click, fill, screenshot, autonomous_task]
    allowed_domains: ["*"]
    can_create_accounts: false
    can_make_purchases: false
    max_autonomous_steps: 50

  narrative_content_lead:
    allowed_actions: [navigate, click, fill, login, upload_file, drag_drop, screenshot, autonomous_task]
    allowed_domains:
      - "*.heygen.com"
      - "*.canva.com"
      - "*.youtube.com"
      - "*.instagram.com"
      - "*.tiktok.com"
    can_create_accounts: true
    can_make_purchases: false
    max_autonomous_steps: 75

  operations_lead:
    allowed_actions: [navigate, click, fill, screenshot, autonomous_task]
    allowed_domains: ["*"]
    can_create_accounts: false
    can_make_purchases: false
    max_autonomous_steps: 50

  engineering_lead:
    allowed_actions: [navigate, click, fill, screenshot, autonomous_task, login]
    allowed_domains: ["*"]
    can_create_accounts: false
    can_make_purchases: false
    max_autonomous_steps: 50

  executive_operator:
    allowed_actions: [navigate, click, fill, login, autonomous_task, upload_file, drag_drop, screenshot]
    allowed_domains: ["*"]
    can_create_accounts: true
    can_make_purchases: false
    max_autonomous_steps: 150

  sales_outreach_lead:
    allowed_actions: [navigate, click, fill, login, autonomous_task]
    allowed_domains:
      - "*.linkedin.com"
      - "*.instantly.ai"
      - "*.apollo.io"
      - "*.hubspot.com"
    can_create_accounts: true
    can_make_purchases: false
    max_autonomous_steps: 75

  marketing_campaigns_lead:
    allowed_actions: [navigate, click, fill, login, autonomous_task, upload_file, screenshot]
    allowed_domains:
      - "*.meta.com"
      - "*.facebook.com"
      - "*.instagram.com"
      - "*.google.com"
      - "*.canva.com"
    can_create_accounts: true
    can_make_purchases: false
    max_autonomous_steps: 75

  client_success_lead:
    allowed_actions: [navigate, click, fill, login, autonomous_task, screenshot]
    allowed_domains:
      - "*.hubspot.com"
      - "*.instantly.ai"
      - "*.lemonsqueezy.com"
    can_create_accounts: false
    can_make_purchases: false
    max_autonomous_steps: 50

  social_media_lead:
    allowed_actions: [navigate, click, fill, login, autonomous_task, upload_file, drag_drop, screenshot]
    allowed_domains:
      - "*.instagram.com"
      - "*.tiktok.com"
      - "*.youtube.com"
      - "*.linkedin.com"
      - "*.facebook.com"
      - "*.twitter.com"
      - "*.canva.com"
    can_create_accounts: true
    can_make_purchases: false
    max_autonomous_steps: 100

  defaults:
    can_create_accounts: true       # Allowed but MA-16 approval gate required each time
    can_make_purchases: false       # MA-8 rule: blocked
    max_autonomous_steps: 50
    allowed_actions: [navigate, click, fill, screenshot]
