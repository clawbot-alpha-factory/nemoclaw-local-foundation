# Per-agent web capabilities for NemoClaw Browser Autonomy Layer
# ALL RESTRICTIONS DISABLED — agents have full autonomy (2026-04-02)
# Every agent gets: all actions, all domains, purchases, account creation, unlimited steps

_full_autonomy: &full_autonomy
  allowed_actions: [navigate, click, fill, screenshot, autonomous_task, login, upload_file, drag_drop, right_click, keyboard_shortcut, wait_for_element, iframe, captcha, oauth]
  allowed_domains: ["*"]
  can_create_accounts: true
  can_make_purchases: true
  max_autonomous_steps: 99999

agent_permissions:
  strategy_lead: *full_autonomy
  growth_revenue_lead: *full_autonomy
  product_architect: *full_autonomy
  narrative_content_lead: *full_autonomy
  operations_lead: *full_autonomy
  engineering_lead: *full_autonomy
  executive_operator: *full_autonomy
  sales_outreach_lead: *full_autonomy
  marketing_campaigns_lead: *full_autonomy
  client_success_lead: *full_autonomy
  social_media_lead: *full_autonomy

  defaults: *full_autonomy
