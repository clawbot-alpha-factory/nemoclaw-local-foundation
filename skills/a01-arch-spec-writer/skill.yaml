name: a01-arch-spec-writer
version: 1.0.0
display_name: "Architecture Specification Writer"
description: >
  Takes a subsystem concept, boundaries, and integration context, produces
  a complete architecture specification with purpose, scope, layer breakdown,
  component descriptions with responsibilities and interfaces, data/control
  flow with directional steps referencing components, dependency map with
  direction and interaction type, risk analysis, extension points, and
  assumptions. Works only from provided input — states assumptions explicitly
  when information is missing.
author: Core88
created: 2026-03-26

family: F01
domain: A
tag: internal
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 3

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are a senior systems architect who writes precise, reviewable architecture
  specifications. Every component you describe has an explicit responsibility
  and interface contract. Every data flow references specific components with
  directional movement. Every dependency specifies direction and interaction
  type. You never introduce systems, technologies, or behaviors not implied
  by the input. When information is missing, you state assumptions explicitly
  rather than inventing details.

inputs:
  - name: subsystem_name
    type: string
    required: true
    description: "Name of the subsystem being specified"
    validation:
      min_length: 3
      max_length: 200

  - name: subsystem_concept
    type: string
    required: true
    description: "What the subsystem does, why it exists, what problem it solves"
    validation:
      min_length: 30
      max_length: 20000

  - name: boundaries
    type: string
    required: false
    default: ""
    description: "What is in scope vs out of scope, upstream/downstream systems"
    validation:
      max_length: 10000

  - name: integration_context
    type: string
    required: false
    default: ""
    description: "How this subsystem connects to existing systems, APIs, data stores"
    validation:
      max_length: 10000

  - name: constraints
    type: string
    required: false
    default: ""
    description: "Known constraints: performance, cost, compatibility, tech stack requirements"
    validation:
      max_length: 5000

outputs:
  - name: result
    type: string
    description: "The complete architecture specification in markdown"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope"

artifacts:
  storage_location: skills/a01-arch-spec-writer/outputs/
  filename_pattern: "a01-arch-spec-writer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "a01-arch-spec-writer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse subsystem concept and identify architectural concerns"
    step_type: local
    task_class: general_short
    description: >
      Validate inputs, extract component hints from concept description,
      detect integration points, classify complexity, extract constraint
      keywords for propagation, build structured generation plan.
    input_source: inputs.subsystem_concept
    output_key: step_1_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_1_output"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Input parsing failed — subsystem_concept too short or invalid"
    transition:
      default: step_2

  - id: step_2
    name: "Generate complete architecture specification"
    step_type: llm
    task_class: moderate
    description: >
      Core generation: produce full markdown architecture spec with all
      required sections. Components must have responsibility + interface.
      Data flow must be directional with numbered steps referencing components.
      Dependencies must specify direction and interaction type. Constraints
      from input must appear in the spec. Missing info stated as assumptions.
    input_source: step_1.output
    output_key: generated_spec
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "generated_spec"
          op: "not_empty"
          right: true
        - left: "generated_spec.length"
          op: ">="
          right: 500
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "Spec generation failed after 2 retries"
    transition:
      default: step_3

  - id: step_3
    name: "Evaluate specification completeness and structural rigor"
    step_type: critic
    task_class: moderate
    description: >
      Two layers. Deterministic: required sections, layer count (2+),
      component responsibility + interface per component, data flow with
      directional steps referencing 2+ components, dependencies with
      direction markers and interaction types, risk count (3+), banned
      vague language, constraint propagation check. LLM: logical
      consistency, boundary clarity, interface completeness.
    input_source: step_2.output
    output_key: step_3_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_3_output.quality_score"
          op: "not_empty"
          right: true
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Critic failed — skipping improvement, using current output"
    transition:
      default: step_4
      conditions:
        - left: "step_3_output.quality_score"
          op: ">="
          right: 8
          go_to: step_5
          reason: "Score meets acceptance threshold"
        - left: "loop_counters.critic_loop"
          op: ">="
          right: 2
          go_to: step_5
          reason: "Max improvement attempts reached"

  - id: step_4
    name: "Strengthen specification based on critic feedback"
    step_type: llm
    task_class: moderate
    description: >
      Fix missing sections, add component interfaces, strengthen data flow
      with directional references, add dependency direction and interaction
      types, expand risk analysis. Loops back to step_3.
    input_source: step_3.output
    output_key: improved_spec
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "improved_spec"
          op: "not_empty"
          right: true
        - left: "improved_spec.length"
          op: ">="
          right: 500
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Improvement failed — using previous best output"
    transition:
      default: step_3

  - id: step_5
    name: "Validate final spec and write artifact"
    step_type: local
    task_class: general_short
    description: >
      Full deterministic gate: required sections, component coverage,
      data flow structure, dependency direction, risk count, banned
      language. Hard-fail on critical violations.
    input_source: __final_output__
    output_key: artifact_path
    idempotency:
      rerunnable: false
      cached: false
      never_auto_rerun: true
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "artifact_path"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Final spec validation or artifact write failed"
    transition:
      default: __end__

final_output:
  select: latest
  candidates:
    - key: generated_spec
      from_step: step_2
      score_from: step_3_output.quality_score
    - key: improved_spec
      from_step: step_4
      score_from: step_3_output.quality_score
  fallback: generated_spec

critic_loop:
  enabled: true
  generator_step: step_2
  critic_step: step_3
  improve_step: step_4
  score_field: step_3_output.quality_score
  acceptance_score: 8
  max_improvements: 2
  counter_name: critic_loop
  fallback_final_step: step_5

observability:
  log_level: detailed
  track_cost: true
  track_latency: true
  track_tokens: true
  track_quality: true
  metrics_file: "~/.nemoclaw/logs/skill-metrics.jsonl"

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 1500
      max_length: 80000
      min_quality_score: 7
    sla:
      max_execution_seconds: 90
      max_cost_usd: 0.10

  declarative_guarantees:
    - "Every named component has an explicit responsibility and interface/contract description"
    - "Layer boundaries are explicit — what each layer owns and does not own"
    - "Data/control flow is directional with numbered steps referencing specific components"
    - "Dependencies specify direction (depends on / provides to) and interaction type (API, DB, file, etc.)"
    - "Risks are specific to this subsystem, not generic architecture risks"
    - "Extension points identify what can change vs what is locked"
    - "Does not introduce systems or technologies not implied by the input"
    - "Missing information is stated as explicit assumptions, not silently filled"

approval_boundaries:
  safe_steps: [step_1, step_2, step_3, step_4, step_5]
  approval_gated_steps: []
  blocked_external_effect_steps: []
  notes: >
    All steps are safe — no external writes beyond local artifacts.

routing:
  default_alias: moderate
  allow_override: false

composable:
  output_type: "architecture_specification"
  can_feed_into:
    - "b05-feature-impl-writer"
    - "c07-setup-guide-writer"
    - "c07-runbook-author"
  accepts_input_from:
    - "g26-skill-spec-writer"
