name: out-02-email-executor
version: 1.0.0
display_name: "Email Executor"
description: >
  Sends emails via Resend bridge. Tracks opens/replies. Triggers next step in sequence. Bridge-connected.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: B
tag: outreach
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 3

execution_role: >
  You are an email delivery specialist. Compose and send personalized emails, track engagement, and trigger follow-up actions based on recipient behavior.

inputs:
  - name: email_spec
    type: string
    required: true
    description: "Email details: to, subject, body, from_email"
    validation:
      min_length: 20
      max_length: 5000
  - name: sequence_context
    type: string
    required: false
    description: "Where in the sequence this email falls"
    validation:
      min_length: 5
      max_length: 10000

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/out-02-email-executor/outputs/
  filename_pattern: "out-02-email-executor_{workflow_id}_{timestamp}.md"
  envelope_pattern: "out-02-email-executor_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "outreach_executor_output"

metadata:
  generated_by: "E-9"
  tier: "B"
