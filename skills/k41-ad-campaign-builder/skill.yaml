name: k41-ad-campaign-builder
version: 1.0.0
display_name: "Ad Campaign Builder"
description: >
  Generates complete ad campaign plans with targeting, creative briefs, budget allocation, and A/B test variants.
author: NemoClaw Factory
created: 2026-03-31
language: en

family: K41
domain: K
tag: marketing
skill_type: generator

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 6

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are a digital advertising strategist. Create comprehensive ad campaign plans with targeting and creative.

inputs:
  - name: campaign_goal
    type: string
    required: true
    description: "Campaign objective and target outcome"
    validation:
      min_length: 10
      max_length: 5000
  - name: budget
    type: string
    required: true
    description: "Campaign budget and timeline"
    validation:
      min_length: 5
      max_length: 500
  - name: platform
    type: string
    required: false
    description: "Advertising platform"
    validation:
      min_length: 5
      max_length: 10000
    default: "google_ads"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope for skill chaining"

artifacts:
  storage_location: skills/k41-ad-campaign-builder/outputs/
  filename_pattern: "k41-ad-campaign-builder_{workflow_id}_{timestamp}.md"
  envelope_pattern: "k41-ad-campaign-builder_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse input and prepare analysis context"
    step_type: local
    task_class: general_short
    description: "Validate inputs, extract key parameters, prepare context for generation."
    input_source: inputs
    output_key: step_1_output
    failure:
      strategy: halt
      retry_count: 0

  - id: step_2
    name: "Generate primary output"
    step_type: llm
    task_class: premium
    description: "Core generation step using execution_role persona."
    input_source: step_1.output
    output_key: generated_output
    failure:
      strategy: retry
      retry_count: 2

  - id: step_3
    name: "Evaluate output quality"
    step_type: critic
    task_class: moderate
    description: "Score output on relevance, completeness, and actionability."
    input_source: step_2.output
    output_key: step_3_output
    failure:
      strategy: fallback
      retry_count: 1
      fallback_step: step_5

  - id: step_5
    name: "Validate and write artifact"
    step_type: local
    task_class: general_short
    description: "Write markdown artifact and JSON envelope."
    input_source: __final_output__
    output_key: artifact_path
    failure:
      strategy: halt
      retry_count: 0

routing:
  default_alias: premium
  allow_override: false

composable:
  output_type: "marketing_generator_output"
  can_feed_into: []
  accepts_input_from: []

metadata:
  generated_by: "skill-factory"
  factory_version: "E-5"
  quality_score: null
  approved_by: null

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback
