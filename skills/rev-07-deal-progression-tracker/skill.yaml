name: rev-07-deal-progression-tracker
version: 1.0.0
display_name: "Deal Progression Tracker"
description: >
  Maintains state per deal: last touch, next action, days in stage, risk score. Triggers agent actions on stale deals automatically.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: A
tag: revenue
skill_type: tracker

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 8

execution_role: >
  You are a deal tracking specialist. Monitor every deal's health and recommend immediate actions for stale or at-risk opportunities.

inputs:
  - name: deals_data
    type: string
    required: true
    description: "Active deals with stage, last activity, value"
    validation:
      min_length: 10
      max_length: 15000
  - name: stale_threshold_days
    type: string
    required: false
    description: "Days before a deal is flagged stale"
    validation:
      min_length: 5
      max_length: 10000
    default: "3"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/rev-07-deal-progression-tracker/outputs/
  filename_pattern: "rev-07-deal-progression-tracker_{workflow_id}_{timestamp}.md"
  envelope_pattern: "rev-07-deal-progression-tracker_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "revenue_tracker_output"

metadata:
  generated_by: "E-9"
  tier: "A"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 400
      max_length: 10000
      min_quality_score: 7
    sla:
      max_execution_seconds: 90
      max_cost_usd: 0.2
