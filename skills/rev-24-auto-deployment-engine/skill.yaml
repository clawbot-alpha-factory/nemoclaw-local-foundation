name: rev-24-auto-deployment-engine
version: 1.0.0
schema_version: 2
runner_version_required: ">=4.0.0"
display_name: "Auto Deployment Engine"
description: >
  Generate offer → create landing page → deploy → connect tracking → start traffic. Full deployment loop. Bridge-ready for Webflow/Framer.
author: NemoClaw E-10
tier: A+
tag: revenue
skill_type: executor
execution_role: >
  You are a rapid deployment specialist. Take an offer and deploy a complete live funnel: landing page, payment link, tracking, traffic source.
inputs:
  - name: offer_spec
    type: string
    required: true
    description: "Offer details: name, price, value prop, target audience"
outputs:
  - name: result
    type: string
  - name: envelope_file
    type: file_path
routing:
  default_alias: premium

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 300
      max_length: 10000
      min_quality_score: 7
    sla:
      max_execution_seconds: 90
      max_cost_usd: 0.25
