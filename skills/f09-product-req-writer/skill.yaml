name: f09-product-req-writer
version: 1.0.0
display_name: "Product Requirements Writer"
description: >
  Takes a product idea, target audience, and business context, produces
  a structured product requirements document with problem statement,
  user stories (As a/I want/so that), functional requirements (system
  behaviors), non-functional requirements (categorized), testable
  acceptance criteria linked to user stories, MoSCoW prioritization,
  dependencies with type and direction, success metrics with measurable
  targets, edge cases, and scope boundaries. Works only from provided
  input — states assumptions when data is missing.
author: Core88
created: 2026-03-26

family: F09
domain: F
tag: dual-use
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 6

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are a senior product manager who writes precise, actionable product
  requirements documents. User stories follow "As a [role], I want [action],
  so that [benefit]" format with unique IDs. Acceptance criteria are testable
  with measurable conditions and linked to specific user stories. Functional
  requirements describe system behaviors, not user desires. Non-functional
  requirements are categorized. Success metrics have numbers and timeframes.
  You never invent market data, user personas, or statistics not in the input.

inputs:
  - name: product_idea
    type: string
    required: true
    description: "What the product/feature does, who it's for, what problem it solves"
    validation:
      min_length: 30
      max_length: 20000

  - name: target_audience
    type: string
    required: true
    description: "Who uses this — role, technical level, pain points"
    validation:
      min_length: 10
      max_length: 5000

  - name: business_context
    type: string
    required: false
    default: ""
    description: "Market position, revenue model, competitive landscape, strategic goals"
    validation:
      max_length: 10000

  - name: constraints
    type: string
    required: false
    default: ""
    description: "Budget, timeline, tech stack, regulatory, team size limitations"
    validation:
      max_length: 5000

  - name: scope_level
    type: string
    required: false
    default: mvp
    description: "mvp (minimum viable, Must+Should only, ≤7 stories), full (complete, all MoSCoW), increment (feature addition to existing system)"
    validation:
      allowed_values: [mvp, full, increment]

outputs:
  - name: result
    type: string
    description: "The complete product requirements document in markdown"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope"

artifacts:
  storage_location: skills/f09-product-req-writer/outputs/
  filename_pattern: "f09-product-req-writer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "f09-product-req-writer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse product idea and structure requirements plan"
    step_type: local
    task_class: general_short
    description: >
      Validate inputs, extract requirement themes, classify complexity,
      detect constraint categories, determine scope enforcement rules,
      build generation plan.
    input_source: inputs.product_idea
    output_key: step_1_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_1_output"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Input parsing failed"
    transition:
      default: step_2

  - id: step_2
    name: "Generate complete product requirements document"
    step_type: llm
    task_class: complex_reasoning
    description: >
      Core generation: produce full PRD with problem statement, scope
      (in/out), user stories with IDs, functional requirements as system
      behaviors, categorized NFRs, testable acceptance criteria linked
      to stories, MoSCoW, typed dependencies, measurable success metrics,
      edge cases. Anti-hallucination enforced in prompt.
    input_source: step_1.output
    output_key: generated_prd
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "generated_prd"
          op: "not_empty"
          right: true
        - left: "generated_prd.length"
          op: ">="
          right: 500
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "PRD generation failed after 2 retries"
    transition:
      default: step_3

  - id: step_3
    name: "Evaluate requirements completeness and structural rigor"
    step_type: critic
    task_class: moderate
    description: >
      Two layers. Deterministic: required sections, user story format+count,
      acceptance criteria testability (condition+measurable), criteria linkage,
      MoSCoW presence, scope enforcement, FR/US separation, dependency
      type+direction, success metric measurability, edge cases, banned
      vague language. LLM: logical consistency, audience fit, scope alignment.
    input_source: step_2.output
    output_key: step_3_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_3_output.quality_score"
          op: "not_empty"
          right: true
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Critic failed — using current output"
    transition:
      default: step_4
      conditions:
        - left: "step_3_output.quality_score"
          op: ">="
          right: 7
          go_to: step_5
          reason: "Score meets acceptance threshold"
        - left: "loop_counters.critic_loop"
          op: ">="
          right: 2
          go_to: step_5
          reason: "Max improvement attempts reached"

  - id: step_4
    name: "Strengthen requirements based on critic feedback"
    step_type: llm
    task_class: complex_reasoning
    description: >
      Fix missing sections, add acceptance criteria with linkage,
      strengthen metrics, add edge cases. Loops back to step_3.
    input_source: step_3.output
    output_key: improved_prd
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "improved_prd"
          op: "not_empty"
          right: true
        - left: "improved_prd.length"
          op: ">="
          right: 500
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Improvement failed — using previous best output"
    transition:
      default: step_3

  - id: step_5
    name: "Validate final PRD and write artifact"
    step_type: local
    task_class: general_short
    description: >
      Full deterministic gate. Hard-fail on critical violations.
    input_source: __final_output__
    output_key: artifact_path
    idempotency:
      rerunnable: false
      cached: false
      never_auto_rerun: true
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "artifact_path"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Final PRD validation or artifact write failed"
    transition:
      default: __end__

final_output:
  select: latest
  candidates:
    - key: generated_prd
      from_step: step_2
      score_from: step_3_output.quality_score
    - key: improved_prd
      from_step: step_4
      score_from: step_3_output.quality_score
  fallback: generated_prd

critic_loop:
  enabled: true
  generator_step: step_2
  critic_step: step_3
  improve_step: step_4
  score_field: step_3_output.quality_score
  acceptance_score: 10
  max_improvements: 5
  counter_name: critic_loop
  fallback_final_step: step_5

observability:
  log_level: detailed
  track_cost: true
  track_latency: true
  track_tokens: true
  track_quality: true
  metrics_file: "~/.nemoclaw/logs/skill-metrics.jsonl"

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 1500
      max_length: 80000
      min_quality_score: 7
    sla:
      max_execution_seconds: 90
      max_cost_usd: 0.10

  declarative_guarantees:
    - "User stories follow As a/I want/so that format with unique IDs (US-1, US-2...)"
    - "Acceptance criteria are testable: condition word AND measurable element required"
    - "Acceptance criteria are linked to specific user stories or functional requirements"
    - "Functional requirements describe system behaviors — no As a patterns"
    - "Non-functional requirements are categorized (performance, security, scalability, etc.)"
    - "Priorities use MoSCoW with scope-appropriate levels"
    - "Dependencies specify type (technical, business, external) and direction"
    - "Success metrics contain measurable targets with numbers or timeframes"
    - "Edge cases and failure scenarios included (minimum 2)"
    - "Scope section includes both in-scope and out-of-scope"
    - "No invented market data — assumptions stated explicitly when data is missing"

approval_boundaries:
  safe_steps: [step_1, step_2, step_3, step_4, step_5]
  approval_gated_steps: []
  blocked_external_effect_steps: []

routing:
  default_alias: complex_reasoning
  allow_override: false

composable:
  output_type: "product_requirements"
  can_feed_into:
    - "b05-feature-impl-writer"
    - "a01-arch-spec-writer"
    - "f09-pricing-strategist"
  accepts_input_from:
    - "j36-biz-idea-validator"
    - "e12-market-research-analyst"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0
