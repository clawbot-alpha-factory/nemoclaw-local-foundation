name: d11-video-script-writer
version: 1.0.0
display_name: "Video Script Writer"
description: "Transforms script briefs into structured video scripts for marketing and educational content. Produces platform-optimized scripts with hooks, scene breakdowns with timing, on-screen text callouts, B-roll/visual direction cues, CTA placement, and brand voice consistency across YouTube long-form, TikTok/Reels short-form, LinkedIn, and general video formats."
author: Core88
created: "2026-03-26"
family: F11
domain: D
tag: customer-facing
skill_type: transformer
schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 8
context_requirements:
  - workflow_id
  - budget_state
  - step_history
execution_role: "You are an expert video script writer specializing in marketing and educational content across multiple platforms. You craft compelling hooks, structure scenes with precise timing, embed visual direction cues and on-screen text callouts, and maintain strict brand voice consistency. You never fabricate statistics, quotes, or claims not grounded in the provided reference material. You understand platform-specific conventions for YouTube, TikTok/Reels, LinkedIn, and general video formats."

inputs:
  - name: script_brief
    type: string
    required: true
    description: "The core brief describing the video's topic, key messages, goals, and any specific requirements or constraints."
    validation:
      min_length: 50
      max_length: 10000
  - name: target_audience
    type: string
    required: true
    description: "Description of the intended viewer demographic, psychographics, knowledge level, and pain points."
    validation:
      min_length: 10
      max_length: 2000
  - name: video_format
    type: string
    required: true
    description: "The target platform and format determining length constraints, hook timing, and structural conventions."
    validation:
      allowed_values:
        - youtube_longform
        - tiktok_reels_shortform
        - linkedin
        - general
  - name: brand_voice
    type: string
    required: true
    description: "Brand voice guidelines including tone descriptors, vocabulary preferences, phrases to use or avoid, and personality traits."
    validation:
      min_length: 10
      max_length: 3000
  - name: reference_material
    type: string
    required: false
    description: "Supporting facts, data points, quotes, product details, or source material that the script may reference. All claims in the script must be traceable to this material or the brief."
    default: ""
    validation:
      max_length: 15000
  - name: video_duration_target
    type: string
    required: false
    description: "Optional target duration for the video. If not provided, platform defaults apply (60s for short-form, 8-12min for YouTube long-form, 90-120s for LinkedIn, 3-5min for general)."
    default: ""
    validation:
      max_length: 50

outputs:
  - name: result
    type: string
    description: "The complete structured video script in markdown format including hook, scene breakdowns with timing, on-screen text callouts, B-roll/visual direction cues, CTA placement, and platform-specific formatting."
  - name: result_file
    type: file_path
    description: "Path to the written video script artifact file."
  - name: envelope_file
    type: file_path
    description: "Path to the execution envelope JSON file with provenance and quality metadata."

artifacts:
  storage_location: "skills/d11-video-script-writer/outputs/"
  filename_pattern: "d11-video-script-writer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "d11-video-script-writer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse brief and build generation plan"
    step_type: local
    task_class: general_short
    description: "Validates all inputs, resolves platform-specific constraints (hook window, duration limits, structural requirements), extracts key messages from the brief, catalogs reference material for anti-fabrication traceability, and assembles a structured generation plan including segment count, timing budget, and CTA placement strategy."
    input_source: "inputs.script_brief"
    output_key: step_1_output
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_1_output"
          op: not_empty
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Failed to parse script brief and build generation plan. Check that inputs are valid and the brief meets minimum length requirements."
    transition:
      default: step_2
      conditions: []

  - id: step_2
    name: "Generate structured video script draft"
    step_type: llm
    task_class: premium
    description: "Generates the complete structured video script following the generation plan. Produces: (1) a platform-appropriate hook within the timing window (5s for short-form, 15s for long-form), (2) scene/segment breakdowns with precise timing allocations, (3) on-screen text callouts marked with [ON-SCREEN] tags, (4) B-roll and visual direction cues marked with [VISUAL] tags, (5) a single CTA placement at the strategically optimal position, (6) speaker dialogue/narration with tone markers. All factual claims are grounded in the reference material or brief. Output maintains brand voice throughout."
    input_source: "step_1.output"
    output_key: generated_script
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "generated_script"
          op: not_empty
          right: true
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "Failed to generate video script draft after retries. The LLM may be unavailable or the brief may be too complex for a single generation pass."
    transition:
      default: step_3
      conditions: []

  - id: step_3
    name: "Evaluate script quality and compliance"
    step_type: critic
    task_class: moderate
    description: "Two-layer validation of the generated script. Deterministic layer: verifies hook exists within timing window, checks scene/segment count and timing sum against duration target, confirms exactly one CTA is present, validates [ON-SCREEN] and [VISUAL] tag presence and formatting, checks for fabricated claims not traceable to reference material, verifies platform-specific length constraints. LLM layer: scores hook engagement quality, narrative flow and pacing, brand voice consistency, audience appropriateness, visual direction clarity, and CTA effectiveness. Final quality_score is min(deterministic_score, llm_score) on 0-10 scale. Returns structured feedback with specific improvement directives."
    input_source: "step_2.output"
    output_key: step_3_output
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_3_output"
          op: not_empty
          right: true
      strategy: retry
      retry_count: 1
      fallback_step: null
      escalation_message: "Critic evaluation of video script failed. Unable to assess script quality."
    transition:
      default: step_4
      conditions:
        - left: "step_3_output.quality_score"
          op: ">="
          right: 7
          go_to: step_5
          reason: "Script meets quality threshold; proceed directly to artifact writing."
        - left: "loop_counters.critic_loop"
          op: ">="
          right: 2
          go_to: step_5
          reason: "Maximum improvement iterations reached; proceed with best available script."

  - id: step_4
    name: "Improve script based on critic feedback"
    step_type: llm
    task_class: premium
    description: "Revises the video script based on specific critic feedback. Addresses identified issues including: weak or slow hooks, timing imbalances across segments, missing or poorly formatted on-screen text callouts, insufficient visual direction cues, CTA placement or effectiveness problems, brand voice drift, fabricated claims, pacing issues, and platform constraint violations. Preserves strong elements while surgically improving flagged areas."
    input_source: "step_3.output"
    output_key: improved_script
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "improved_script"
          op: not_empty
          right: true
      strategy: retry
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Script improvement step failed. Falling back to best previously generated version."
    transition:
      default: step_3
      conditions: []

  - id: step_5
    name: "Write final script artifact to disk"
    step_type: local
    task_class: general_short
    description: "Final deterministic gate that selects the highest-quality script version, performs a last structural integrity check, and writes the artifact to the configured storage location. Returns the standard artifact_written confirmation."
    input_source: "__final_output__"
    output_key: artifact_path
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "artifact_path"
          op: not_empty
          right: true
      strategy: retry
      retry_count: 1
      fallback_step: null
      escalation_message: "Failed to write final video script artifact to disk."
    transition:
      default: "__end__"
      conditions: []

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 500
      max_length: 50000
      min_quality_score: 7
    sla:
      max_execution_seconds: 300
      max_cost_usd: 2.50
  declarative_guarantees:
    - "Every factual claim in the script is traceable to the provided reference material or script brief; no statistics, quotes, or data points are fabricated."
    - "The hook appears within the first 5 seconds for short-form formats and within the first 15 seconds for long-form formats."
    - "Exactly one call-to-action is placed in the script at a strategically appropriate position."
    - "All scenes/segments include timing allocations that sum to the target duration within a 10% tolerance."
    - "On-screen text callouts are marked with [ON-SCREEN] tags and B-roll/visual direction cues are marked with [VISUAL] tags throughout."
    - "Brand voice tone and vocabulary are maintained consistently across all script segments."
    - "Platform-specific length and format constraints are respected for the selected video format."

critic_loop:
  enabled: true
  generator_step: step_2
  critic_step: step_3
  improve_step: step_4
  score_field: "step_3_output.quality_score"
  acceptance_score: 10
  max_improvements: 5
  counter_name: critic_loop
  fallback_final_step: step_5

final_output:
  select: highest_quality
  candidates:
    - key: generated_script
      from_step: step_2
      score_from: step_3_output.quality_score
    - key: improved_script
      from_step: step_4
      score_from: step_3_output.quality_score
  fallback: generated_script

approval_boundaries:
  safe_steps:
    - step_1
    - step_2
    - step_3
    - step_4
    - step_5
  approval_gated_steps: []
  blocked_external_effect_steps: []
  notes: "All steps are safe as the skill produces script artifacts without external side effects. No approval gates required for content generation and local file writing."

routing:
  default_alias: premium
  allow_override: false

composable:
  output_type: structured_video_script
  can_feed_into: []
  accepts_input_from: []

observability:
  log_level: detailed
  track_cost: true
  track_latency: true
  track_tokens: true
  track_quality: true
  metrics_file: "~/.nemoclaw/logs/skill-metrics.jsonl"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0
