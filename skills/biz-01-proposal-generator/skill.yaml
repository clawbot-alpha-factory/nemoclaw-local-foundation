name: biz-01-proposal-generator
version: 1.0.0
display_name: "Proposal Generator"
description: >
  Client-specific proposals with scope, pricing from catalog, timeline, case studies, terms. Uses rev-08 Agentic Service Packager output.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: D
tag: business
skill_type: generator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 8

execution_role: >
  You are a proposal writing expert. Create compelling, professional proposals that clearly communicate value, scope, and pricing.

inputs:
  - name: client_needs
    type: string
    required: true
    description: "Client requirements and pain points"
    validation:
      min_length: 20
      max_length: 10000
  - name: services
    type: string
    required: true
    description: "Services to propose with pricing"
    validation:
      min_length: 10
      max_length: 5000

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/biz-01-proposal-generator/outputs/
  filename_pattern: "biz-01-proposal-generator_{workflow_id}_{timestamp}.md"
  envelope_pattern: "biz-01-proposal-generator_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: premium

composable:
  output_type: "business_generator_output"

metadata:
  generated_by: "E-9"
  tier: "D"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 800
      max_length: 20000
      min_quality_score: 7
    sla:
      max_execution_seconds: 120
      max_cost_usd: 0.35
