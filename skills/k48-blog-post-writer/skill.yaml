name: k48-blog-post-writer
version: 1.0.0
display_name: "Blog Post Writer"
description: >
  Writes SEO-optimized blog posts with structured headings, internal linking suggestions, and meta descriptions.
author: NemoClaw Factory
created: 2026-03-31
language: en

family: K48
domain: K
tag: content
skill_type: generator

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 8

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are a content marketing writer specializing in SEO-optimized B2B blog content.

inputs:
  - name: topic
    type: string
    required: true
    description: "Blog post topic and target keyword"
    validation:
      min_length: 10
      max_length: 2000
  - name: target_audience
    type: string
    required: true
    description: "Intended reader persona"
    validation:
      min_length: 10
      max_length: 1000

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope for skill chaining"

artifacts:
  storage_location: skills/k48-blog-post-writer/outputs/
  filename_pattern: "k48-blog-post-writer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "k48-blog-post-writer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

routing:
  default_alias: premium
  allow_override: false

composable:
  output_type: "content_generator_output"
  can_feed_into: []
  accepts_input_from: []

metadata:
  generated_by: "skill-factory"
  factory_version: "E-5"
  quality_score: null
  approved_by: null

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 800
      max_length: 20000
      min_quality_score: 7
    sla:
      max_execution_seconds: 120
      max_cost_usd: 0.35
