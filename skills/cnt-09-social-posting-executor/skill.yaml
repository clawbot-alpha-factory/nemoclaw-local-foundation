name: cnt-09-social-posting-executor
version: 1.0.0
display_name: "Social Posting Executor"
description: >
  Posts to IG/TikTok/LinkedIn via bridges. Tracks performance per post. Feeds analytics back into cnt-07. Bridge-ready for Buffer/Meta APIs.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: C
tag: content
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 6

execution_role: >
  You are a social media posting specialist. Format content for each platform's requirements and execute posting with performance tracking.

inputs:
  - name: post_content
    type: string
    required: true
    description: "Content to post with platform-specific formatting"
    validation:
      min_length: 10
      max_length: 5000
  - name: platform
    type: string
    required: true
    description: "Target platform: linkedin, instagram, tiktok, twitter"
    validation:
      min_length: 3
      max_length: 50

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/cnt-09-social-posting-executor/outputs/
  filename_pattern: "cnt-09-social-posting-executor_{workflow_id}_{timestamp}.md"
  envelope_pattern: "cnt-09-social-posting-executor_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "content_executor_output"

metadata:
  generated_by: "E-9"
  tier: "C"

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 9.0
  max_iterations: 4
  escalation: retry_with_feedback
