name: biz-07-competitive-intelligence-monitor
version: 1.0.0
display_name: "Competitive Intelligence Monitor"
description: >
  Daily scan of competitor pricing, features, messaging. Weekly summary. Alerts on major changes. Enforced action output.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: D
tag: business
skill_type: analyzer

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 3

execution_role: >
  You are a competitive intelligence analyst. Monitor competitor movements and translate changes into actionable strategic recommendations.

inputs:
  - name: competitors
    type: string
    required: true
    description: "Competitors to monitor: names, URLs, focus areas"
    validation:
      min_length: 10
      max_length: 5000
  - name: focus_areas
    type: string
    required: false
    description: "What to monitor"
    validation:
      min_length: 5
      max_length: 10000
    default: "pricing,features,messaging,hiring"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

  - name: insight
    type: string
    description: "Key insight from analysis"
  - name: recommended_action
    type: string
    description: "Specific action to take"
  - name: trigger_skill
    type: string
    description: "Skill ID to trigger (or null to stop)"
  - name: confidence
    type: float
    description: "Confidence score 0-1"

artifacts:
  storage_location: skills/biz-07-competitive-intelligence-monitor/outputs/
  filename_pattern: "biz-07-competitive-intelligence-monitor_{workflow_id}_{timestamp}.md"
  envelope_pattern: "biz-07-competitive-intelligence-monitor_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "business_analyzer_output"

metadata:
  generated_by: "E-9"
  tier: "D"
