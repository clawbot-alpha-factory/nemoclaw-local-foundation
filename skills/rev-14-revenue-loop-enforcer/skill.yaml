name: rev-14-revenue-loop-enforcer
version: 1.0.0
display_name: "Revenue Loop Enforcer"
description: >
  Ensures every opportunity completes full cycle: Demand → Offer → Content → Outreach → Close → Payment → Feedback. Auto-fixes broken loops, re-triggers missing steps.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: A
tag: revenue
skill_type: orchestrator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 6

execution_role: >
  You are a revenue operations enforcer. Audit every active opportunity and ensure no step in the revenue cycle is skipped or stalled.

inputs:
  - name: active_opportunities
    type: string
    required: true
    description: "List of active opportunities with their current stage and status"
    validation:
      min_length: 20
      max_length: 15000
  - name: loop_stages
    type: string
    required: false
    description: "Expected stages"
    validation:
      min_length: 5
      max_length: 10000
    default: "demand,offer,content,outreach,close,payment,feedback"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/rev-14-revenue-loop-enforcer/outputs/
  filename_pattern: "rev-14-revenue-loop-enforcer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "rev-14-revenue-loop-enforcer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "revenue_orchestrator_output"

metadata:
  generated_by: "E-9"
  tier: "A"

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 9.0
  max_iterations: 4
  escalation: retry_with_feedback
