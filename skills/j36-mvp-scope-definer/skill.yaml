name: j36-mvp-scope-definer
version: "1.0.0"
display_name: "MVP Scope Definer"
description: "An MVP scope definer that takes a product idea, target audience, resource constraints, and timeline. Produces a structured MVP scope document with prioritized feature list (MoSCoW), user journey map for core flow, technical scope boundaries, launch criteria checklist, risk-adjusted timeline, explicit out-of-scope section, and resource allocation recommendations. Supports scope-driven generation modes and grounds all timeline estimates in stated constraints."
author: "Core88"
created: "2026-03-27"
family: F36
domain: J
tag: dual-use
skill_type: executor
schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 6
context_requirements:
  - workflow_id
  - budget_state
  - step_history
execution_role: "You are a senior product strategist and MVP scoping expert. You define lean, achievable MVP scopes by ruthlessly prioritizing features using MoSCoW methodology, grounding all estimates in real constraints, and preventing scope creep through explicit boundary-setting. You never fabricate timeline estimates — every date and duration must trace back to the stated resource constraints and timeline inputs."

inputs:
  - name: product_idea
    type: string
    required: true
    description: "Description of the product idea including its core value proposition and problem it solves"
    validation:
      min_length: 30
      max_length: 5000
  - name: target_audience
    type: string
    required: true
    description: "Description of the target audience including demographics, pain points, and user personas"
    validation:
      min_length: 20
      max_length: 3000
  - name: resource_constraints
    type: string
    required: true
    description: "Available resources including team size, skill sets, budget, and infrastructure. All timeline estimates will be grounded in these constraints."
    validation:
      min_length: 15
      max_length: 3000
  - name: timeline
    type: string
    required: true
    description: "Target timeline for MVP delivery including hard deadlines, milestones, and any external dependencies"
    validation:
      min_length: 10
      max_length: 2000
  - name: scope_mode
    type: string
    required: false
    description: "Scope generation mode controlling feature count: lean (3-5 features), balanced (5-10 features), or comprehensive (10-15 features)"
    default: "balanced"
    validation:
      allowed_values:
        - lean
        - balanced
        - comprehensive
  - name: domain_context
    type: string
    required: false
    description: "Optional additional context about the industry, regulatory requirements, or competitive landscape"
    default: ""
    validation:
      max_length: 3000
  - name: existing_assets
    type: string
    required: false
    description: "Optional description of existing code, infrastructure, APIs, or third-party services that can be leveraged"
    default: ""
    validation:
      max_length: 3000

outputs:
  - name: result
    type: string
    description: "The complete MVP scope document in structured markdown format including MoSCoW feature prioritization, user journey map, technical scope boundaries, launch criteria, risk-adjusted timeline, out-of-scope section, and resource allocation recommendations"
  - name: result_file
    type: file_path
    description: "Path to the generated MVP scope document markdown file"
  - name: envelope_file
    type: file_path
    description: "Path to the execution envelope JSON file with metadata and quality scores"

artifacts:
  storage_location: "skills/j36-mvp-scope-definer/outputs/"
  filename_pattern: "j36-mvp-scope-definer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "j36-mvp-scope-definer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse inputs and build scoping plan"
    step_type: local
    task_class: general_short
    description: "Validates all inputs, extracts structured data from resource constraints and timeline, determines feature count range based on scope_mode (lean=3-5, balanced=5-10, comprehensive=10-15), identifies existing assets that affect build-vs-buy decisions, and constructs a generation plan with grounding anchors for timeline estimates."
    input_source: "inputs.product_idea"
    output_key: step_1_output
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_1_output"
          op: not_empty
          right: true
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "Failed to parse MVP scope inputs and build generation plan"
    transition:
      default: step_2
      conditions: []

  - id: step_2
    name: "Generate comprehensive MVP scope document"
    step_type: llm
    task_class: complex_reasoning
    description: "Generates the full MVP scope document using the generation plan from step_1. Produces: (1) MoSCoW-prioritized feature list within the scope_mode range, (2) user journey map for core flow only, (3) technical scope boundaries (build vs buy vs skip), (4) launch criteria checklist with measurable thresholds, (5) risk-adjusted timeline with milestones grounded in stated constraints, (6) explicit out-of-scope section to prevent scope creep, (7) resource allocation recommendations. All timeline estimates must reference specific resource constraints — no fabricated durations."
    input_source: "step_1.output"
    output_key: generated_scope
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "generated_scope"
          op: not_empty
          right: true
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "Failed to generate MVP scope document"
    transition:
      default: step_3
      conditions: []

  - id: step_3
    name: "Evaluate scope quality and grounding integrity"
    step_type: critic
    task_class: moderate
    description: "Two-layer validation of the generated MVP scope document. Deterministic layer: verifies presence of all required sections (MoSCoW features, user journey, technical boundaries, launch criteria, timeline, out-of-scope, resource allocation), checks feature count falls within scope_mode range, validates that launch criteria include measurable thresholds, confirms out-of-scope section exists. LLM evaluation layer: scores quality across dimensions — MoSCoW rigor (proper must/should/could/won't categorization), timeline grounding (estimates traceable to stated constraints, no fabricated durations), technical boundary clarity (clear build/buy/skip rationale), launch criteria measurability, user journey coherence, and scope creep prevention strength. Combines scores using min() to produce final quality_score 0-10."
    input_source: "step_2.output"
    output_key: step_3_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_3_output"
          op: not_empty
          right: true
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "Failed to evaluate MVP scope document quality"
    transition:
      default: step_4
      conditions:
        - left: "step_3_output.quality_score"
          op: ">="
          right: 7
          go_to: step_5
          reason: "Scope document meets quality threshold, skip improvement and proceed to artifact writing"
        - left: "loop_counters.critic_loop"
          op: ">="
          right: 2
          go_to: step_5
          reason: "Maximum improvement iterations reached, proceed with best available scope document"

  - id: step_4
    name: "Improve scope document from critic feedback"
    step_type: llm
    task_class: complex_reasoning
    description: "Revises the MVP scope document based on specific critic feedback. Addresses identified weaknesses: strengthens MoSCoW categorization if features were misclassified, re-grounds timeline estimates in stated resource constraints if fabrication was detected, sharpens technical boundary rationale, adds measurable thresholds to launch criteria that lacked them, strengthens out-of-scope section if scope creep risks were identified, and improves user journey coherence. Preserves all sections that scored well while surgically improving flagged areas."
    input_source: "step_3.output"
    output_key: improved_scope
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "improved_scope"
          op: not_empty
          right: true
      strategy: retry
      retry_count: 2
      fallback_step: step_5
      escalation_message: "Failed to improve MVP scope document based on critic feedback"
    transition:
      default: step_3
      conditions: []

  - id: step_5
    name: "Write final scope artifact to disk"
    step_type: local
    task_class: general_short
    description: "Final deterministic gate that selects the highest-quality scope document from generation candidates, performs a last structural integrity check ensuring all seven required sections are present, and writes the artifact to the configured storage location. Returns confirmation of artifact write."
    input_source: "__final_output__"
    output_key: artifact_path
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "artifact_path"
          op: not_empty
          right: true
      strategy: retry
      retry_count: 1
      fallback_step: null
      escalation_message: "Failed to write final MVP scope document artifact"
    transition:
      default: "__end__"
      conditions: []

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 1500
      max_length: 30000
      min_quality_score: 7
    sla:
      max_execution_seconds: 300
      max_cost_usd: 1.50
  declarative_guarantees:
    - "All timeline estimates are grounded in stated resource constraints and timeline inputs — no fabricated durations"
    - "Feature count respects scope_mode: lean produces 3-5, balanced produces 5-10, comprehensive produces 10-15 features"
    - "MoSCoW prioritization uses proper Must-Have, Should-Have, Could-Have, and Won't-Have categories"
    - "Launch criteria include measurable thresholds, not vague qualitative statements"
    - "Out-of-scope section explicitly lists excluded features and rationale to prevent scope creep"
    - "Technical scope boundaries provide clear build vs buy vs skip rationale for each component"
    - "User journey map covers only the core MVP flow, not aspirational future flows"
    - "Resource allocation recommendations align with stated team size and skill constraints"

critic_loop:
  enabled: true
  generator_step: step_2
  critic_step: step_3
  improve_step: step_4
  score_field: "step_3_output.quality_score"
  acceptance_score: 7
  max_improvements: 2
  counter_name: critic_loop
  fallback_final_step: step_5

final_output:
  select: highest_quality
  candidates:
    - key: generated_scope
      from_step: step_2
      score_from: step_3_output.quality_score
    - key: improved_scope
      from_step: step_4
      score_from: step_3_output.quality_score
  fallback: generated_scope

approval_boundaries:
  safe_steps:
    - step_1
    - step_2
    - step_3
    - step_4
    - step_5
  approval_gated_steps: []
  blocked_external_effect_steps: []
  notes: "All steps are safe — scope definition is a read-only analytical task with no external side effects"

routing:
  default_alias: complex_reasoning
  allow_override: false

composable:
  output_type: "mvp_scope_document"
  can_feed_into: []
  accepts_input_from: []

observability:
  log_level: detailed
  track_cost: true
  track_latency: true
  track_tokens: true
  track_quality: true
  metrics_file: "~/.nemoclaw/logs/skill-metrics.jsonl"

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0
