name: k58-contract-template-engine
version: 1.0.0
display_name: "Contract Template Engine"
description: >
  Generate MSA (Master Service Agreement) and SLA (Service Level Agreement) templates. Produces professional contract documents with MENA-aware legal terms.
author: NemoClaw Factory
created: 2026-04-02
language: en

family: K58
domain: K
tag: legal
skill_type: generator

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 6

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are a contract drafting specialist. Create clear, professional service agreements with appropriate legal protections for both parties.

inputs:
  - name: contract_type
    type: string
    required: true
    description: "Type of contract: MSA, SLA, or SOW"
    validation:
      allowed_values: ["MSA", "SLA", "SOW"]
  - name: provider_info
    type: string
    required: true
    description: "Service provider name, location, and description"
    validation:
      min_length: 10
      max_length: 2000
  - name: client_info
    type: string
    required: true
    description: "Client name, location, and business type"
    validation:
      min_length: 10
      max_length: 2000
  - name: service_description
    type: string
    required: true
    description: "Description of services to be provided"
    validation:
      min_length: 10
      max_length: 5000
  - name: jurisdiction
    type: string
    required: false
    description: "Legal jurisdiction"
    default: "Jordan"
    validation:
      max_length: 200
  - name: payment_terms
    type: string
    required: false
    description: "Payment terms and billing schedule"
    validation:
      max_length: 1000
  - name: sla_metrics
    type: string
    required: false
    description: "SLA metrics and targets (for SLA type contracts)"
    validation:
      max_length: 2000

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope for skill chaining"

artifacts:
  storage_location: skills/k58-contract-template-engine/outputs/
  filename_pattern: "k58-contract-template-engine_{workflow_id}_{timestamp}.md"
  envelope_pattern: "k58-contract-template-engine_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse Contract Request"
    step_type: local
    task_class: general_short
    description: "Validate inputs, extract contract parameters, prepare drafting context."
    input_source: inputs
    output_key: step_1_output
    failure:
      strategy: halt
      retry_count: 0

  - id: step_2
    name: "Draft Contract"
    step_type: llm
    task_class: moderate
    description: "Draft complete contract document with all standard clauses and party-specific terms."
    input_source: step_1.output
    output_key: step_2_output
    failure:
      strategy: retry
      retry_count: 2

  - id: step_3
    name: "Legal Compliance Check"
    step_type: critic
    task_class: moderate
    description: "Score contract on legal completeness, enforceability, clarity, and jurisdiction compliance."
    input_source: step_2.output
    output_key: step_3_output
    failure:
      strategy: fallback
      retry_count: 1
      fallback_step: step_4

  - id: step_4
    name: "Write Artifact"
    step_type: local
    task_class: general_short
    description: "Write markdown artifact and JSON envelope."
    input_source: __final_output__
    output_key: artifact_path
    failure:
      strategy: halt
      retry_count: 0

routing:
  default_alias: moderate
  allow_override: false

composable:
  output_type: "legal_generator_output"
  can_feed_into: []
  accepts_input_from: []

metadata:
  generated_by: "skill-factory"
  factory_version: "E-5"
  quality_score: null
  approved_by: null

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 9.0
  max_iterations: 4
  escalation: retry_with_feedback
