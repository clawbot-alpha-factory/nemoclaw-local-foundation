name: rev-06-revenue-orchestrator
version: 1.0.0
display_name: "Revenue Orchestrator"
description: >
  Meta-skill: decides what to do next based on pipeline state. No leads → trigger content. Low conversion → trigger offer optimizer. Stale deals → trigger follow-up. Consumes all analyzer outputs. Confidence gating: auto-execute if confidence > 0.8 and demand_volume high.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: A
tag: revenue
skill_type: orchestrator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 8

execution_role: >
  You are the revenue operations commander. Analyze the current state of the entire revenue pipeline and decide the single highest-impact action to take right now.

inputs:
  - name: pipeline_state
    type: string
    required: true
    description: "Current pipeline: leads, deals, conversion rates, revenue, bottlenecks"
    validation:
      min_length: 20
      max_length: 15000
  - name: available_budget
    type: string
    required: false
    description: "Available daily budget in USD"
    validation:
      min_length: 5
      max_length: 10000
    default: "20.0"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/rev-06-revenue-orchestrator/outputs/
  filename_pattern: "rev-06-revenue-orchestrator_{workflow_id}_{timestamp}.md"
  envelope_pattern: "rev-06-revenue-orchestrator_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: premium

composable:
  output_type: "revenue_orchestrator_output"

metadata:
  generated_by: "E-9"
  tier: "A"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback
