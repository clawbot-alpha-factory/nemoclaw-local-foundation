name: cnt-06-content-calendar-builder
version: 1.0.0
display_name: "Content Calendar Builder"
description: >
  30-day content plan across all channels. Maps content to funnel stages. Balances education/entertainment/conversion.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: C
tag: content
skill_type: generator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 6

execution_role: >
  You are a content strategist. Build a comprehensive 30-day calendar that drives consistent engagement and conversions across all channels.

inputs:
  - name: business_context
    type: string
    required: true
    description: "Business, audience, goals for the month"
    validation:
      min_length: 20
      max_length: 5000
  - name: channels
    type: string
    required: false
    description: "Active channels"
    validation:
      min_length: 5
      max_length: 10000
    default: "linkedin,instagram,tiktok,youtube,email"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/cnt-06-content-calendar-builder/outputs/
  filename_pattern: "cnt-06-content-calendar-builder_{workflow_id}_{timestamp}.md"
  envelope_pattern: "cnt-06-content-calendar-builder_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "content_generator_output"

metadata:
  generated_by: "E-9"
  tier: "C"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback
