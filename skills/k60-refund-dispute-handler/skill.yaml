name: k60-refund-dispute-handler
version: 1.0.0
display_name: "Refund & Dispute Handler"
description: >
  Payment dispute resolution — refund processing, dispute analysis, resolution recommendations, credit notes. Analyzes disputes and generates fair, defensible resolution recommendations.
author: NemoClaw Factory
created: 2026-04-02
language: en

family: "60"
domain: K
tag: revenue
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 6

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are an expert payment dispute analyst specializing in SaaS billing disputes, refund processing, and client retention through fair resolution.

inputs:
  - name: dispute_context
    type: string
    required: true
    description: "What happened, client complaint, invoice details"
    validation:
      min_length: 20
      max_length: 5000
  - name: dispute_type
    type: string
    required: true
    description: "Type of dispute"
    validation:
      allowed_values:
        - refund_request
        - partial_refund
        - credit_note
        - chargeback
        - billing_error
  - name: client_info
    type: string
    required: true
    description: "Client name, subscription details, history"
    validation:
      min_length: 5
      max_length: 2000
  - name: amount_usd
    type: string
    required: false
    description: "Disputed amount in USD"
    validation:
      max_length: 20
  - name: service_period
    type: string
    required: false
    description: "Service period in question"
    validation:
      max_length: 100

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope for skill chaining"

artifacts:
  storage_location: skills/k60-refund-dispute-handler/outputs/
  filename_pattern: "k60-refund-dispute-handler_{workflow_id}_{timestamp}.md"
  envelope_pattern: "k60-refund-dispute-handler_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse Dispute"
    step_type: local
    task_class: general_short
    description: "Validate inputs, extract dispute parameters, prepare context."
    input_source: inputs
    output_key: step_1_output
    failure:
      strategy: halt
      retry_count: 0

  - id: step_2
    name: "Analyze Case"
    step_type: llm
    task_class: moderate
    description: "Analyze the dispute — validity assessment, service delivery vs promise, contract terms, precedent, financial impact."
    input_source: step_1.output
    output_key: step_2_output
    failure:
      strategy: retry
      retry_count: 2

  - id: step_3
    name: "Generate Resolution"
    step_type: llm
    task_class: moderate
    description: "Generate resolution recommendation — refund/partial/credit/deny with rationale, client communication draft, prevention measures."
    input_source: step_2.output
    output_key: step_3_output
    failure:
      strategy: retry
      retry_count: 2

  - id: step_4
    name: "Quality Review"
    step_type: critic
    task_class: moderate
    description: "Score output on fairness, completeness, client retention impact, and legal defensibility."
    input_source: step_3.output
    output_key: step_4_output
    failure:
      strategy: fallback
      retry_count: 1
      fallback_step: step_5

  - id: step_5
    name: "Write Artifact"
    step_type: local
    task_class: general_short
    description: "Write markdown artifact and JSON envelope."
    input_source: __final_output__
    output_key: artifact_path
    failure:
      strategy: halt
      retry_count: 0

routing:
  default_alias: moderate
  allow_override: false

composable:
  output_type: "revenue_executor_output"
  can_feed_into: []
  accepts_input_from: []

metadata:
  generated_by: "skill-factory"
  factory_version: "E-5"
  quality_score: null
  approved_by: null

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 9.0
  max_iterations: 4
  escalation: retry_with_feedback
