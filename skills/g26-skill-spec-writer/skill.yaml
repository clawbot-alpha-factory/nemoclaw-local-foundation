name: g26-skill-spec-writer
version: 1.0.0
display_name: "Skill Spec Writer"
description: >
  Takes a skill concept and metadata, produces a complete schema-v2-compliant
  skill.yaml specification. Encodes all v2 schema rules into generation prompts
  and validates output with deterministic structural checks plus LLM quality review.
author: Core88
created: 2026-03-25

family: F26
domain: G
tag: internal
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 8

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are an expert NemoClaw skill architect who produces precise, schema-v2-compliant
  skill.yaml specifications. You know every structural rule, naming convention, and
  field requirement of the v2 schema. You never invent fields outside the schema and
  never rename required fields.

inputs:
  - name: skill_concept
    type: string
    required: true
    description: "Natural language description of the skill: what it does, who it's for, what it produces"
    validation:
      min_length: 20
      max_length: 5000

  - name: skill_id
    type: string
    required: true
    description: "Target skill ID following naming convention (e.g., b05-feature-impl-writer)"
    validation:
      min_length: 5
      max_length: 40

  - name: skill_name
    type: string
    required: true
    description: "Human-readable display name"
    validation:
      min_length: 3
      max_length: 80

  - name: family
    type: string
    required: true
    description: "Family code (e.g., F05)"
    validation:
      min_length: 2
      max_length: 4

  - name: domain
    type: string
    required: true
    description: "Domain letter (A-L)"
    validation:
      allowed_values: [A, B, C, D, E, F, G, H, I, J, K, L]

  - name: tag
    type: string
    required: true
    description: "internal, customer-facing, or dual-use"
    validation:
      allowed_values: [internal, customer-facing, dual-use]

  - name: skill_type
    type: string
    required: false
    default: executor
    description: "One of: executor, planner, evaluator, transformer, router"
    validation:
      allowed_values: [executor, planner, evaluator, transformer, router]

  - name: step_hints
    type: string
    required: false
    default: ""
    description: "Optional comma-separated hints for step names and purposes"

  - name: has_critic_loop
    type: boolean
    required: false
    default: false
    description: "Whether to include critic loop structure in the generated spec"

outputs:
  - name: result
    type: string
    description: "The complete skill.yaml content as a string"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact containing the YAML"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope for skill chaining"

artifacts:
  storage_location: skills/g26-skill-spec-writer/outputs/
  filename_pattern: "g26-skill-spec-writer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "g26-skill-spec-writer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse skill concept and validate naming convention"
    step_type: local
    task_class: general_short
    description: >
      Validate skill_id format (domain_letter + zero-padded family + slug),
      domain/family consistency, tag validity. Extract structured requirements
      from the concept description. Hard-fail on any missing required input.
    input_source: inputs.skill_concept
    output_key: step_1_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_1_output"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Input validation failed — invalid skill_id format or missing required fields"
    transition:
      default: step_2

  - id: step_2
    name: "Generate complete skill.yaml specification"
    step_type: llm
    task_class: premium
    description: >
      Core generation: produce full skill.yaml following schema v2 law.
      System prompt includes the complete schema spec as reference.
      Output ONLY valid YAML — no markdown fences, no explanations.
      Forbid invented or renamed fields.
    input_source: step_1.output
    output_key: generated_yaml
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "generated_yaml"
          op: "not_empty"
          right: true
        - left: "generated_yaml.length"
          op: ">="
          right: 200
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "YAML generation failed after 2 retries — model returned empty or too-short response"
    transition:
      default: step_3

  - id: step_3
    name: "Validate schema compliance and structural correctness"
    step_type: critic
    task_class: moderate
    description: >
      Two-layer validation: (1) deterministic checks — YAML parse, required keys,
      valid step types, uniqueness, forbidden fields; (2) LLM checks — naming quality,
      clarity, completeness, consistency. Combined score with deterministic failures
      heavily penalized.
    input_source: step_2.output
    output_key: step_3_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_3_output.quality_score"
          op: "not_empty"
          right: true
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Critic failed — skipping improvement, using current output"
    transition:
      default: step_4
      conditions:
        - left: "step_3_output.quality_score"
          op: ">="
          right: 7
          go_to: step_5
          reason: "Score meets acceptance threshold"
        - left: "loop_counters.critic_loop"
          op: ">="
          right: 2
          go_to: step_5
          reason: "Max improvement attempts reached"

  - id: step_4
    name: "Fix schema violations based on critic feedback"
    step_type: llm
    task_class: premium
    description: >
      Takes the critic's feedback listing specific violations and fixes them.
      Loops back to step_3 for re-evaluation.
    input_source: step_3.output
    output_key: improved_yaml
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "improved_yaml"
          op: "not_empty"
          right: true
        - left: "improved_yaml.length"
          op: ">="
          right: 200
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Improvement failed — using previous best output"
    transition:
      default: step_3

  - id: step_5
    name: "Write validated skill.yaml artifact"
    step_type: local
    task_class: general_short
    description: >
      Final YAML parse validation — hard-fail if parse fails. Select best
      scored output, write markdown artifact and JSON envelope.
    input_source: __final_output__
    output_key: artifact_path
    idempotency:
      rerunnable: false
      cached: false
      never_auto_rerun: true
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "artifact_path"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Final YAML validation or artifact write failed"
    transition:
      default: __end__

final_output:
  select: latest
  candidates:
    - key: generated_yaml
      from_step: step_2
      score_from: step_3_output.quality_score
    - key: improved_yaml
      from_step: step_4
      score_from: step_3_output.quality_score
  fallback: generated_yaml

critic_loop:
  enabled: true
  generator_step: step_2
  critic_step: step_3
  improve_step: step_4
  score_field: step_3_output.quality_score
  acceptance_score: 10
  max_improvements: 5
  counter_name: critic_loop
  fallback_final_step: step_5

observability:
  log_level: detailed
  track_cost: true
  track_latency: true
  track_tokens: true
  track_quality: true
  metrics_file: "~/.nemoclaw/logs/skill-metrics.jsonl"

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 200
      max_length: 30000
      min_quality_score: 7
    sla:
      max_execution_seconds: 90
      max_cost_usd: 0.10

  declarative_guarantees:
    - "Output is valid parseable YAML"
    - "Output follows skill-yaml-schema-v2 structure completely"
    - "All step names are semantic — minimum 3 words, no banned terms"
    - "success_conditions use structured left/op/right format"
    - "Transitions use structured left/op/right/go_to format"
    - "No makes_llm_call field — step_type determines LLM usage"
    - "No decision step type — only local, llm, critic"
    - "No best_available in input_source"
    - "Contracts split into machine_validated and declarative_guarantees"
    - "critic_loop block is first-class when has_critic_loop is true"
    - "No invented fields outside schema v2"
    - "No renamed required schema fields"

approval_boundaries:
  safe_steps: [step_1, step_2, step_3, step_4, step_5]
  approval_gated_steps: []
  blocked_external_effect_steps: []
  notes: >
    All steps are safe — no external writes beyond local artifacts.

routing:
  default_alias: moderate
  allow_override: false

composable:
  output_type: "skill_yaml_spec"
  can_feed_into:
    - "g26-skill-template-generator"
  accepts_input_from: []

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0
