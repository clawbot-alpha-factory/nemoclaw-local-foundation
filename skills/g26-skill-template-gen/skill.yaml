name: g26-skill-template-gen
version: 1.0.0
display_name: "Skill Template Generator"
description: >
  Takes a skill.yaml and generates an architecture-aligned first-draft run.py
  with step handlers, provider dispatch, and validation structure. Produces
  strong prompt scaffolding and correct runtime wiring. Human review of
  generated run.py is still required before deployment.
author: Core88
created: 2026-03-25

family: F26
domain: G
tag: internal
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 3

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are an expert NemoClaw skill implementer who generates architecture-aligned
  Python code for skill run.py files. You follow the established reference patterns
  exactly. You never invent new runtime conventions, helper abstractions, or state
  management beyond what the runner contract provides.

inputs:
  - name: skill_yaml
    type: string
    required: true
    description: "Complete skill.yaml content to generate code for"
    validation:
      min_length: 200
      max_length: 30000

  - name: reference_pattern
    type: string
    required: false
    default: executor
    description: "Advisory hint for which reference to follow. Step 1 infers actual requirements from skill.yaml."
    validation:
      allowed_values: [executor, transformer, evaluator]

  - name: deterministic_check_type
    type: string
    required: false
    default: none
    description: "What kind of deterministic preservation checks to generate"
    validation:
      allowed_values: [none, numeric, structural, schema, custom]

outputs:
  - name: result
    type: string
    description: "The complete run.py content as a string"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact containing the Python code"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope for skill chaining"

artifacts:
  storage_location: skills/g26-skill-template-gen/outputs/
  filename_pattern: "g26-skill-template-gen_{workflow_id}_{timestamp}.md"
  envelope_pattern: "g26-skill-template-gen_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse skill.yaml and classify step implementation requirements"
    step_type: local
    task_class: general_short
    description: >
      YAML parse plus deep classification per step: pure local transform vs
      LLM generation vs critic evaluation. Determines output type per step,
      identifies deterministic validation needs, detects critic loop, classifies
      final step behavior, determines tag-appropriate routing defaults.
    input_source: inputs.skill_yaml
    output_key: step_1_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_1_output"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "skill.yaml parsing or classification failed"
    transition:
      default: step_2

  - id: step_2
    name: "Generate architecture-aligned run.py implementation"
    step_type: llm
    task_class: premium
    description: >
      Produce run.py following reference patterns. System prompt includes hard
      rules, reference architecture, and step_1 classification. Must not invent
      helpers, state fields, or runtime interfaces beyond skill.yaml and
      approved reference.
    input_source: step_1.output
    output_key: generated_code
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "generated_code"
          op: "not_empty"
          right: true
        - left: "generated_code.length"
          op: ">="
          right: 500
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "Code generation failed after 2 retries"
    transition:
      default: step_3

  - id: step_3
    name: "Validate code correctness and architectural compliance"
    step_type: critic
    task_class: moderate
    description: >
      Two layers: deterministic (compile, handler coverage, call_resolved usage,
      local steps no LLM calls, critic returns structured JSON, imports present,
      __main__ args correct) plus LLM (prompt quality, pattern adherence,
      completeness).
    input_source: step_2.output
    output_key: step_3_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_3_output.quality_score"
          op: "not_empty"
          right: true
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Critic failed — skipping improvement, using current output"
    transition:
      default: step_4
      conditions:
        - left: "step_3_output.quality_score"
          op: ">="
          right: 8
          go_to: step_5
          reason: "Score meets acceptance threshold"
        - left: "loop_counters.critic_loop"
          op: ">="
          right: 2
          go_to: step_5
          reason: "Max improvement attempts reached"

  - id: step_4
    name: "Fix code issues based on critic feedback"
    step_type: llm
    task_class: premium
    description: >
      Fix violations identified by the critic. Loops back to step_3.
    input_source: step_3.output
    output_key: improved_code
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "improved_code"
          op: "not_empty"
          right: true
        - left: "improved_code.length"
          op: ">="
          right: 500
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Improvement failed — using previous best output"
    transition:
      default: step_3

  - id: step_5
    name: "Validate final code and write artifact"
    step_type: local
    task_class: general_short
    description: >
      Full validation gate: Python compile, handler coverage recheck, required
      function presence, forbidden-pattern check. Hard-fail on any violation.
    input_source: __final_output__
    output_key: artifact_path
    idempotency:
      rerunnable: false
      cached: false
      never_auto_rerun: true
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "artifact_path"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Final code validation or artifact write failed"
    transition:
      default: __end__

final_output:
  select: latest
  candidates:
    - key: generated_code
      from_step: step_2
      score_from: step_3_output.quality_score
    - key: improved_code
      from_step: step_4
      score_from: step_3_output.quality_score
  fallback: generated_code

critic_loop:
  enabled: true
  generator_step: step_2
  critic_step: step_3
  improve_step: step_4
  score_field: step_3_output.quality_score
  acceptance_score: 8
  max_improvements: 2
  counter_name: critic_loop
  fallback_final_step: step_5

observability:
  log_level: detailed
  track_cost: true
  track_latency: true
  track_tokens: true
  track_quality: true
  metrics_file: "~/.nemoclaw/logs/skill-metrics.jsonl"

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 500
      max_length: 50000
      min_quality_score: 7
    sla:
      max_execution_seconds: 120
      max_cost_usd: 0.15

  declarative_guarantees:
    - "Output is valid Python that compiles without errors"
    - "STEP_HANDLERS dict contains an entry for every step_id in the skill.yaml"
    - "LLM and critic steps use call_resolved() with proper context passing"
    - "Local steps do not call call_resolved() or any LLM call function"
    - "Critic step handlers return structured JSON with quality_score field"
    - "__main__ block follows standard argparse pattern with --step and --input"
    - "Required imports are present for all referenced modules"
    - "No invented helper functions, state fields, or runtime interfaces"
    - "Generated code follows current runner contract for artifact and output handling"

approval_boundaries:
  safe_steps: [step_1, step_2, step_3, step_4, step_5]
  approval_gated_steps: []
  blocked_external_effect_steps: []
  notes: >
    All steps are safe — no external writes beyond local artifacts.

routing:
  default_alias: moderate
  allow_override: false

composable:
  output_type: "skill_run_py"
  can_feed_into: []
  accepts_input_from:
    - "g26-skill-spec-writer"
