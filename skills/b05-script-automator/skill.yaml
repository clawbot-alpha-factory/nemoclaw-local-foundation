name: b05-script-automator
version: 1.0.0
display_name: "Script Automator"
description: >
  Takes a task description, target shell, and operational context, produces
  a complete automation script with argument parsing, input validation,
  conditional error handling, logging, dry-run support for destructive
  operations, exit code discipline, and usage documentation. Focused on
  operational scripts — the glue that connects systems and replaces manual
  CLI workflows. Does NOT execute the script.
author: Core88
created: 2026-03-26

family: F05
domain: B
tag: dual-use
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 3

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are a senior DevOps engineer who writes precise, production-minded
  automation scripts. Every script has argument parsing, usage documentation,
  and proper exit codes. Error handling covers file operations, subprocess
  calls, and network requests — not trivial operations. Destructive scripts
  require dry-run mode and confirmation prompts. You never embed secrets
  in code. You never hardcode environment-specific paths without making
  them configurable.

inputs:
  - name: task_description
    type: string
    required: true
    description: "What the script should automate, trigger conditions, expected behavior"
    validation:
      min_length: 30
      max_length: 20000

  - name: target_shell
    type: string
    required: true
    description: "Target language for the script"
    validation:
      allowed_values: [bash, python, node]

  - name: operational_context
    type: string
    required: false
    default: ""
    description: "Systems involved, file paths, APIs called, environment assumptions"
    validation:
      max_length: 10000

  - name: safety_requirements
    type: string
    required: false
    default: ""
    description: "What must NOT happen: data loss prevention, confirmation prompts, dry-run needs"
    validation:
      max_length: 5000

  - name: output_format
    type: string
    required: false
    default: standalone
    description: "standalone (single script) or script_plus_config (script + config file)"
    validation:
      allowed_values: [standalone, script_plus_config]

outputs:
  - name: result
    type: string
    description: "The complete automation script in markdown"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope"

artifacts:
  storage_location: skills/b05-script-automator/outputs/
  filename_pattern: "b05-script-automator_{workflow_id}_{timestamp}.md"
  envelope_pattern: "b05-script-automator_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse task and classify script type"
    step_type: local
    task_class: general_short
    description: >
      Validate inputs, classify script type (data_pipeline, deployment,
      maintenance, monitoring, integration, destructive), detect safety
      needs, determine dry-run and confirmation requirements, identify
      error handling risk paths, build generation plan.
    input_source: inputs.task_description
    output_key: step_1_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_1_output"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Input parsing failed — task_description too short or target_shell invalid"
    transition:
      default: step_2

  - id: step_2
    name: "Generate complete automation script with safety controls"
    step_type: llm
    task_class: complex_reasoning
    description: >
      Core generation: produce script with argument parsing, input
      validation, conditional error handling, logging, dry-run mode
      for destructive/deployment scripts, confirmation prompt for
      destructive scripts, exit codes, usage header, idempotency
      where applicable.
    input_source: step_1.output
    output_key: generated_script
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "generated_script"
          op: "not_empty"
          right: true
        - left: "generated_script.length"
          op: ">="
          right: 200
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "Script generation failed after 2 retries"
    transition:
      default: step_3

  - id: step_3
    name: "Evaluate script completeness and safety compliance"
    step_type: critic
    task_class: moderate
    description: >
      Two layers. Deterministic: argument parsing, usage docs, conditional
      error handling, no embedded secrets, no bad hardcoded paths, dry-run
      behavioral enforcement for destructive scripts, exit codes, logging
      for observable scripts, shebang for bash. LLM: logic correctness,
      safety coverage, operational robustness.
    input_source: step_2.output
    output_key: step_3_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_3_output.quality_score"
          op: "not_empty"
          right: true
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Critic failed — skipping improvement, using current output"
    transition:
      default: step_4
      conditions:
        - left: "step_3_output.quality_score"
          op: ">="
          right: 7
          go_to: step_5
          reason: "Score meets acceptance threshold"
        - left: "loop_counters.critic_loop"
          op: ">="
          right: 2
          go_to: step_5
          reason: "Max improvement attempts reached"

  - id: step_4
    name: "Strengthen script based on critic feedback"
    step_type: llm
    task_class: complex_reasoning
    description: >
      Fix missing safety controls, add argument parsing, strengthen
      error handling, add dry-run behavioral logic. Loops back to step_3.
    input_source: step_3.output
    output_key: improved_script
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "improved_script"
          op: "not_empty"
          right: true
        - left: "improved_script.length"
          op: ">="
          right: 200
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Improvement failed — using previous best output"
    transition:
      default: step_3

  - id: step_5
    name: "Validate final script and write artifact"
    step_type: local
    task_class: general_short
    description: >
      Full deterministic gate: argument parsing, usage, error handling,
      secrets, paths, dry-run, exit codes, logging, shebang. Hard-fail
      on critical violations.
    input_source: __final_output__
    output_key: artifact_path
    idempotency:
      rerunnable: false
      cached: false
      never_auto_rerun: true
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "artifact_path"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Final script validation or artifact write failed"
    transition:
      default: __end__

final_output:
  select: latest
  candidates:
    - key: generated_script
      from_step: step_2
      score_from: step_3_output.quality_score
    - key: improved_script
      from_step: step_4
      score_from: step_3_output.quality_score
  fallback: generated_script

critic_loop:
  enabled: true
  generator_step: step_2
  critic_step: step_3
  improve_step: step_4
  score_field: step_3_output.quality_score
  acceptance_score: 7
  max_improvements: 2
  counter_name: critic_loop
  fallback_final_step: step_5

observability:
  log_level: detailed
  track_cost: true
  track_latency: true
  track_tokens: true
  track_quality: true
  metrics_file: "~/.nemoclaw/logs/skill-metrics.jsonl"

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 300
      max_length: 50000
      min_quality_score: 7
    sla:
      max_execution_seconds: 90
      max_cost_usd: 0.10

  declarative_guarantees:
    - "Argument parsing for all configurable values — no magic constants"
    - "Error handling on file operations, subprocess calls, and network requests — not on trivial operations"
    - "No embedded secrets, tokens, API keys, or passwords — use environment variables or arguments"
    - "Dry-run mode for destructive/deployment scripts with behavioral enforcement (prevents execution, prints intended actions)"
    - "Confirmation prompt for destructive scripts unless --force is provided"
    - "Usage/help documentation accessible via --help or header comment"
    - "Exit 0 on success, non-zero on failure"
    - "Logging for data pipeline, deployment, and monitoring scripts"
    - "Idempotent where applicable — safe to re-run without unintended side effects"

approval_boundaries:
  safe_steps: [step_1, step_2, step_3, step_4, step_5]
  approval_gated_steps: []
  blocked_external_effect_steps: []
  notes: >
    All steps are safe — produces script as text only. Does not execute.

routing:
  default_alias: complex_reasoning
  allow_override: false

composable:
  output_type: "automation_script"
  can_feed_into:
    - "c07-setup-guide-writer"
    - "c07-runbook-author"
  accepts_input_from:
    - "a01-arch-spec-writer"
    - "b05-feature-impl-writer"
