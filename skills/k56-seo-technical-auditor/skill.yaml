name: k56-seo-technical-auditor
version: 1.0.0
display_name: "SEO Technical Auditor"
description: >
  Technical SEO audit — site structure, page speed, meta tags, schema markup recommendations. Produces actionable audit reports with prioritized fixes.
author: NemoClaw Factory
created: 2026-04-02
language: en

family: K56
domain: K
tag: marketing
skill_type: analyzer

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 6

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are a technical SEO auditor specializing in site structure analysis, page speed optimization, meta tag auditing, and schema markup implementation.

inputs:
  - name: website_url
    type: string
    required: true
    description: "Website URL to audit"
    validation:
      min_length: 10
      max_length: 2000
  - name: focus_areas
    type: string
    required: false
    description: "Comma-separated focus areas (meta tags, page speed, mobile, schema markup, etc.)"
    default: "all"
    validation:
      max_length: 1000
  - name: depth
    type: string
    required: false
    description: "Audit depth: quick, standard, deep"
    default: "standard"
    validation:
      max_length: 20

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope for skill chaining"

artifacts:
  storage_location: skills/k56-seo-technical-auditor/outputs/
  filename_pattern: "k56-seo-technical-auditor_{workflow_id}_{timestamp}.md"
  envelope_pattern: "k56-seo-technical-auditor_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse Request"
    step_type: local
    task_class: general_short
    description: "Validate inputs, extract URL and focus areas, prepare audit context."
    input_source: inputs
    output_key: step_1_output
    failure:
      strategy: halt
      retry_count: 0

  - id: step_2
    name: "Audit Structure"
    step_type: llm
    task_class: moderate
    description: "Audit site structure, URL hierarchy, internal linking, crawlability, and indexation issues."
    input_source: step_1.output
    output_key: step_2_output
    failure:
      strategy: retry
      retry_count: 2

  - id: step_3
    name: "Audit Performance"
    step_type: llm
    task_class: moderate
    description: "Audit page speed, Core Web Vitals, mobile optimization, meta tags, and schema markup."
    input_source: step_2.output
    output_key: step_3_output
    failure:
      strategy: retry
      retry_count: 2

  - id: step_4
    name: "Generate Recommendations"
    step_type: llm
    task_class: moderate
    description: "Generate prioritized technical SEO recommendations with implementation guides."
    input_source: step_3.output
    output_key: step_4_output
    failure:
      strategy: retry
      retry_count: 2

  - id: step_5
    name: "Quality Review"
    step_type: critic
    task_class: moderate
    description: "Score audit on thoroughness, accuracy, actionability, and prioritization."
    input_source: step_4.output
    output_key: step_5_output
    failure:
      strategy: fallback
      retry_count: 1
      fallback_step: step_6

  - id: step_6
    name: "Write Artifact"
    step_type: local
    task_class: general_short
    description: "Write markdown artifact and JSON envelope."
    input_source: __final_output__
    output_key: artifact_path
    failure:
      strategy: halt
      retry_count: 0

routing:
  default_alias: moderate
  allow_override: false

composable:
  output_type: "marketing_analyzer_output"
  can_feed_into: []
  accepts_input_from: []

metadata:
  generated_by: "skill-factory"
  factory_version: "E-5"
  quality_score: null
  approved_by: null

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 9.0
  max_iterations: 4
  escalation: retry_with_feedback
