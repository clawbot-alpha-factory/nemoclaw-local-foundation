name: ops-02-event-bus
version: 1.0.0
schema_version: 2
runner_version_required: ">=4.0.0"
display_name: "Event Bus Controller"
description: >
  Routes real-time events: email opens, payments, scraper signals, deal advances. Feeds orchestrator + priority engine.
author: NemoClaw E-10
tier: A+
tag: operations
skill_type: executor
execution_role: >
  You are an event routing specialist. Analyze incoming events and determine the optimal agent and skill to handle each one.
inputs:
  - name: event_data
    type: string
    required: true
    description: "Event details: type, source, payload"
outputs:
  - name: result
    type: string
  - name: envelope_file
    type: file_path
routing:
  default_alias: moderate

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 300
      max_length: 10000
      min_quality_score: 7
    sla:
      max_execution_seconds: 90
      max_cost_usd: 0.25
