name: scl-06-growth-experiment-designer
version: 1.0.0
display_name: "Growth Experiment Designer"
description: >
  Hypothesis → test design → success metrics → timeline → analysis template. 10 experiments per run.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: E
tag: scale
skill_type: generator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 3

execution_role: >
  You are a growth hacking specialist. Design rapid experiments with clear hypotheses, metrics, and timelines that drive measurable growth.

inputs:
  - name: growth_goal
    type: string
    required: true
    description: "What growth metric to improve"
    validation:
      min_length: 10
      max_length: 2000
  - name: constraints
    type: string
    required: false
    description: "Resource constraints"
    validation:
      min_length: 5
      max_length: 10000
    default: "budget_limited"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/scl-06-growth-experiment-designer/outputs/
  filename_pattern: "scl-06-growth-experiment-designer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "scl-06-growth-experiment-designer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "scale_generator_output"

metadata:
  generated_by: "E-9"
  tier: "E"
