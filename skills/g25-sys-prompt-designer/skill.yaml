name: g25-sys-prompt-designer
version: 1.0.0
display_name: "System Prompt Designer"
description: >
  Takes a skill's purpose and LLM step descriptions (or a full skill.yaml),
  generates structured system prompts for each LLM step following the F35
  reference pattern: role definition, explicit constraints, output format
  rules, and forbidden behaviors.
author: Core88
created: 2026-03-25

family: F25
domain: G
tag: internal
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 8

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are an expert prompt engineer who designs structured, specific system
  prompts for NemoClaw skill LLM steps. You follow the F35 Tone Calibrator
  reference pattern: explicit role definition, precise task description,
  hard constraints, output format rules, and forbidden behaviors. You never
  write vague or generic prompts.

inputs:
  - name: skill_purpose
    type: string
    required: true
    description: "What the skill does, who it's for, what it produces"
    validation:
      min_length: 20
      max_length: 5000

  - name: skill_id
    type: string
    required: true
    description: "Skill ID for context (e.g., e08-comp-intel-synth)"
    validation:
      min_length: 3
      max_length: 40

  - name: tag
    type: string
    required: true
    description: "internal, customer-facing, or dual-use — drives quality bar language"
    validation:
      allowed_values: [internal, customer-facing, dual-use]

  - name: skill_yaml
    type: string
    required: false
    default: ""
    description: "Full skill.yaml content — step 1 extracts LLM steps automatically. Use this OR llm_steps."
    validation:
      max_length: 30000

  - name: llm_steps
    type: string
    required: false
    default: ""
    description: "JSON array of LLM step objects with step_id, step_name, step_description, step_type, input_description, output_description. Use this OR skill_yaml."
    validation:
      max_length: 20000

  - name: execution_role
    type: string
    required: false
    default: ""
    description: "Foundation persona. If empty, the skill generates one."
    validation:
      max_length: 2000

  - name: domain_constraints
    type: string
    required: false
    default: ""
    description: "Domain-specific rules the prompts must enforce"
    validation:
      max_length: 5000

  - name: output_format_preference
    type: string
    required: false
    default: prose
    description: "What format LLM steps should output"
    validation:
      allowed_values: [prose, structured_json, yaml, markdown_sections]

outputs:
  - name: result
    type: string
    description: "JSON object with one system prompt per LLM step"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope"

artifacts:
  storage_location: skills/g25-sys-prompt-designer/outputs/
  filename_pattern: "g25-sys-prompt-designer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "g25-sys-prompt-designer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse inputs and build prompt generation plan"
    step_type: local
    task_class: general_short
    description: >
      Accepts either skill_yaml or llm_steps. If skill_yaml provided, parses
      YAML and extracts LLM/critic steps automatically. Validates step data,
      classifies prompt needs per step. Builds generation plan.
    input_source: inputs.skill_purpose
    output_key: step_1_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_1_output"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Input parsing failed — need either valid skill_yaml or llm_steps"
    transition:
      default: step_2

  - id: step_2
    name: "Generate structured system prompts for all LLM steps"
    step_type: llm
    task_class: premium
    description: >
      Core generation. Produces JSON with one prompt per LLM step. Each prompt
      follows the F35 pattern. System prompt embeds reference architecture and
      banned/required patterns.
    input_source: step_1.output
    output_key: generated_prompts
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "generated_prompts"
          op: "not_empty"
          right: true
        - left: "generated_prompts.length"
          op: ">="
          right: 200
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "Prompt generation failed after 2 retries"
    transition:
      default: step_3

  - id: step_3
    name: "Evaluate prompt quality and structural completeness"
    step_type: critic
    task_class: moderate
    description: >
      Two layers. Deterministic: JSON parse, step coverage, minimum length,
      banned phrases, required structure, output format checks, capability
      hallucination check. LLM: specificity, constraint coverage, role precision.
    input_source: step_2.output
    output_key: step_3_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_3_output.quality_score"
          op: "not_empty"
          right: true
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Critic failed — skipping improvement, using current output"
    transition:
      default: step_4
      conditions:
        - left: "step_3_output.quality_score"
          op: ">="
          right: 7
          go_to: step_5
          reason: "Score meets acceptance threshold"
        - left: "loop_counters.critic_loop"
          op: ">="
          right: 2
          go_to: step_5
          reason: "Max improvement attempts reached"

  - id: step_4
    name: "Improve prompts based on critic feedback"
    step_type: llm
    task_class: premium
    description: >
      Fix vague language, add missing constraints, strengthen output format
      rules. Loops back to step_3.
    input_source: step_3.output
    output_key: improved_prompts
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "improved_prompts"
          op: "not_empty"
          right: true
        - left: "improved_prompts.length"
          op: ">="
          right: 200
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Improvement failed — using previous best output"
    transition:
      default: step_3

  - id: step_5
    name: "Validate and write prompt artifact"
    step_type: local
    task_class: general_short
    description: >
      Full deterministic gate: JSON parse, step coverage, minimum length,
      banned phrases, required structure. Hard-fail on any violation.
    input_source: __final_output__
    output_key: artifact_path
    idempotency:
      rerunnable: false
      cached: false
      never_auto_rerun: true
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "artifact_path"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Final prompt validation or artifact write failed"
    transition:
      default: __end__

final_output:
  select: latest
  candidates:
    - key: generated_prompts
      from_step: step_2
      score_from: step_3_output.quality_score
    - key: improved_prompts
      from_step: step_4
      score_from: step_3_output.quality_score
  fallback: generated_prompts

critic_loop:
  enabled: true
  generator_step: step_2
  critic_step: step_3
  improve_step: step_4
  score_field: step_3_output.quality_score
  acceptance_score: 10
  max_improvements: 5
  counter_name: critic_loop
  fallback_final_step: step_5

observability:
  log_level: detailed
  track_cost: true
  track_latency: true
  track_tokens: true
  track_quality: true
  metrics_file: "~/.nemoclaw/logs/skill-metrics.jsonl"

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 500
      max_length: 50000
      min_quality_score: 7
    sla:
      max_execution_seconds: 90
      max_cost_usd: 0.10

  declarative_guarantees:
    - "Every LLM step_id from input has a corresponding prompt in the output"
    - "No prompt contains banned vague phrases"
    - "Each prompt has role, task, constraints, and output format sections"
    - "Each prompt explicitly references skill purpose and step-specific objective in task description"
    - "Critic step prompts include scoring dimensions and JSON output format with quality_score"
    - "Customer-facing tag prompts include higher quality bar language"
    - "No prompt claims capabilities the skill does not have"

approval_boundaries:
  safe_steps: [step_1, step_2, step_3, step_4, step_5]
  approval_gated_steps: []
  blocked_external_effect_steps: []
  notes: >
    All steps are safe — no external writes beyond local artifacts.

routing:
  default_alias: moderate
  allow_override: false

composable:
  output_type: "system_prompts"
  can_feed_into:
    - "g26-skill-template-gen"
  accepts_input_from:
    - "g26-skill-spec-writer"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0
