name: b05-feature-impl-writer
version: 1.0.0
display_name: "Feature Implementation Writer"
description: >
  Takes a feature specification, language, and integration context, produces
  complete first-draft implementation code intended to be runnable after human
  review, integration, and testing. Includes module structure, function/class
  implementations, conditional error handling, inline documentation, and a
  separate test stub. Does NOT execute, compile, or test the code.
author: Core88
created: 2026-03-26

family: F05
domain: B
tag: dual-use
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 6

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are a senior software engineer who writes precise, reviewable implementation
  code. You produce complete first-draft implementations intended to be runnable
  after human review and integration — not placeholder scaffolds. Every function
  has real logic, not stubs. Error handling covers external-input, parsing, I/O,
  and integration paths — you do not add ceremonial try/catch around trivial
  operations. You never claim the code is tested or verified. You never introduce
  dependencies not specified in the input.

inputs:
  - name: feature_spec
    type: string
    required: true
    description: "What to build: feature name, purpose, behavior, acceptance criteria"
    validation:
      min_length: 30
      max_length: 20000

  - name: language
    type: string
    required: true
    description: "Target language or framework"
    validation:
      min_length: 2
      max_length: 50

  - name: integration_context
    type: string
    required: false
    default: ""
    description: "How this code connects to existing systems — imports, APIs, data formats, existing modules"
    validation:
      max_length: 10000

  - name: constraints
    type: string
    required: false
    default: ""
    description: "Performance, security, compatibility, style requirements"
    validation:
      max_length: 5000

  - name: code_style
    type: string
    required: false
    default: documented
    description: "minimal (lean, no comments), documented (inline docs + docstrings), defensive (heavy error handling + validation)"
    validation:
      allowed_values: [minimal, documented, defensive]

outputs:
  - name: result
    type: string
    description: "The complete implementation code in markdown with code blocks"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope"

artifacts:
  storage_location: skills/b05-feature-impl-writer/outputs/
  filename_pattern: "b05-feature-impl-writer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "b05-feature-impl-writer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse feature spec and build structured implementation plan"
    step_type: local
    task_class: general_short
    description: >
      Validate inputs, detect language conventions, extract structured
      implementation plan: expected functions, classes, exported modules,
      test targets, file structure decision (single file, multi-module,
      component+helper+test). Plan drives validation in step_3/step_5.
    input_source: inputs.feature_spec
    output_key: step_1_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_1_output"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Input parsing failed — feature_spec too short or language not recognized"
    transition:
      default: step_2

  - id: step_2
    name: "Generate complete implementation with error handling and documentation"
    step_type: llm
    task_class: complex_reasoning
    description: >
      Core generation: produce code with module structure, all planned
      functions/classes, conditional error handling for external-input and
      I/O paths, inline docs per code_style setting, type hints where
      applicable, and a separate test stub section. React gets component
      structure with props/state separation.
    input_source: step_1.output
    output_key: generated_code
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "generated_code"
          op: "not_empty"
          right: true
        - left: "generated_code.length"
          op: ">="
          right: 200
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "Code generation failed after 2 retries"
    transition:
      default: step_3

  - id: step_3
    name: "Evaluate code quality and specification compliance"
    step_type: critic
    task_class: moderate
    description: >
      Two layers. Deterministic: code blocks present, implementation plan
      coverage (each planned unit has a definition), implementation block
      above minimum length, separate test block present, error handling on
      risk paths, no fake completeness patterns, no unspecified dependencies.
      LLM: logic correctness, spec coverage, code style consistency.
    input_source: step_2.output
    output_key: step_3_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_3_output.quality_score"
          op: "not_empty"
          right: true
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Critic failed — skipping improvement, using current output"
    transition:
      default: step_4
      conditions:
        - left: "step_3_output.quality_score"
          op: ">="
          right: 7
          go_to: step_5
          reason: "Score meets acceptance threshold"
        - left: "loop_counters.critic_loop"
          op: ">="
          right: 2
          go_to: step_5
          reason: "Max improvement attempts reached"

  - id: step_4
    name: "Strengthen implementation based on critic feedback"
    step_type: llm
    task_class: complex_reasoning
    description: >
      Fix missing implementations, add error handling to risk paths,
      strengthen test stubs, remove fake completeness patterns.
      Loops back to step_3.
    input_source: step_3.output
    output_key: improved_code
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "improved_code"
          op: "not_empty"
          right: true
        - left: "improved_code.length"
          op: ">="
          right: 200
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Improvement failed — using previous best output"
    transition:
      default: step_3

  - id: step_5
    name: "Validate final implementation and write artifact"
    step_type: local
    task_class: general_short
    description: >
      Full deterministic gate: implementation plan coverage, code block
      presence, test block presence, error handling on risk paths, no
      fake completeness, no unspecified dependencies. Hard-fail on
      critical violations.
    input_source: __final_output__
    output_key: artifact_path
    idempotency:
      rerunnable: false
      cached: false
      never_auto_rerun: true
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "artifact_path"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Final code validation or artifact write failed"
    transition:
      default: __end__

final_output:
  select: latest
  candidates:
    - key: generated_code
      from_step: step_2
      score_from: step_3_output.quality_score
    - key: improved_code
      from_step: step_4
      score_from: step_3_output.quality_score
  fallback: generated_code

critic_loop:
  enabled: true
  generator_step: step_2
  critic_step: step_3
  improve_step: step_4
  score_field: step_3_output.quality_score
  acceptance_score: 7
  max_improvements: 2
  counter_name: critic_loop
  fallback_final_step: step_5

observability:
  log_level: detailed
  track_cost: true
  track_latency: true
  track_tokens: true
  track_quality: true
  metrics_file: "~/.nemoclaw/logs/skill-metrics.jsonl"

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 500
      max_length: 80000
      min_quality_score: 7
    sla:
      max_execution_seconds: 120
      max_cost_usd: 0.15

  declarative_guarantees:
    - "Every planned implementation unit from step_1 has a corresponding definition in the code"
    - "Error handling covers external-input, parsing, I/O, and integration paths — not ceremonial wrappers"
    - "Test stub covers at least the primary function/class with meaningful assertions"
    - "No dependencies, imports, or frameworks not present in feature_spec, language, or integration_context"
    - "Code style matches the requested level (minimal, documented, defensive)"
    - "No fake completeness patterns (// implementation here, pass in critical path, empty catch, return null placeholder)"
    - "Does not claim code is tested, verified, or production-ready"

approval_boundaries:
  safe_steps: [step_1, step_2, step_3, step_4, step_5]
  approval_gated_steps: []
  blocked_external_effect_steps: []
  notes: >
    All steps are safe — produces code as text only. Does not execute,
    compile, test, or write to filesystem beyond the artifact.

routing:
  default_alias: complex_reasoning
  allow_override: false

composable:
  output_type: "implementation_code"
  can_feed_into:
    - "b05-script-automator"
    - "c07-setup-guide-writer"
  accepts_input_from:
    - "f09-product-req-writer"
    - "a01-arch-spec-writer"

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0
