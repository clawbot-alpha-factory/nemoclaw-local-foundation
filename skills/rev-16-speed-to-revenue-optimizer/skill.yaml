name: rev-16-speed-to-revenue-optimizer
version: 1.0.0
display_name: "Speed-to-Revenue Optimizer"
description: >
  Prioritizes actions that generate fastest cash. Deprioritizes long-term branding when cash is needed. Aligns system with real business constraint: cash flow.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: A
tag: revenue
skill_type: orchestrator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 6

execution_role: >
  You are a cash flow optimization specialist. Given limited resources, identify the fastest path to revenue and ruthlessly prioritize it.

inputs:
  - name: current_state
    type: string
    required: true
    description: "Cash position, pipeline, active campaigns, conversion rates"
    validation:
      min_length: 20
      max_length: 10000
  - name: urgency
    type: string
    required: false
    description: "Cash urgency: low, moderate, critical"
    validation:
      min_length: 5
      max_length: 10000
    default: "moderate"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/rev-16-speed-to-revenue-optimizer/outputs/
  filename_pattern: "rev-16-speed-to-revenue-optimizer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "rev-16-speed-to-revenue-optimizer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: premium

composable:
  output_type: "revenue_orchestrator_output"

metadata:
  generated_by: "E-9"
  tier: "A"

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 9.0
  max_iterations: 4
  escalation: retry_with_feedback
