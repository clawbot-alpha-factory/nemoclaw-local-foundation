name: Agent Self-Promotion Generator
id: cnt-11-agent-self-promo-generator
version: 1.0.0
schema_version: 2
family: "11"
domain: C
tag: social-media
type: generator
runner_version_required: ">=4.0.0"
description: "Generates weekly self-promotion briefs for each agent. Collects performance data, recent wins, milestone progress, and formats into social media content briefs for the social_media_lead (Zara) to turn into viral content."
inputs:
  - name: agent_id
    type: string
    required: true
    description: "The agent ID to generate a promotion brief for"
  - name: performance_data
    type: string
    required: true
    description: "JSON string of agent performance metrics, recent wins, milestones"
outputs:
  result:
    type: string
    description: "Self-promotion brief with talking points, suggested hooks, visual ideas"
  result_file:
    type: string
    description: "Path to the output artifact"
  envelope_file:
    type: string
    description: "Path to the chaining envelope"
artifacts:
  storage_location: outputs
  filename_pattern: "promo-brief-{timestamp}.md"
  envelope_pattern: "envelope-{timestamp}.json"
routing:
  default_alias: moderate
composable:
  output_type: markdown

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 800
      max_length: 20000
      min_quality_score: 7
    sla:
      max_execution_seconds: 120
      max_cost_usd: 0.35
