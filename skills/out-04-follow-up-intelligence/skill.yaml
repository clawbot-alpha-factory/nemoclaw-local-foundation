name: out-04-follow-up-intelligence
version: 1.0.0
display_name: "Follow-Up Intelligence"
description: >
  Analyzes reply sentiment, determines next best action (schedule call, send case study, handle objection, disengage). Enforced action output.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: B
tag: outreach
skill_type: analyzer

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 8

execution_role: >
  You are a conversation intelligence analyst. Read between the lines of prospect replies and recommend the optimal next move.

inputs:
  - name: conversation_history
    type: string
    required: true
    description: "Full email/message thread with prospect"
    validation:
      min_length: 20
      max_length: 10000
  - name: deal_stage
    type: string
    required: false
    description: "Current deal stage"
    validation:
      min_length: 5
      max_length: 10000
    default: "outreach"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

  - name: insight
    type: string
    description: "Key insight from analysis"
  - name: recommended_action
    type: string
    description: "Specific action to take"
  - name: trigger_skill
    type: string
    description: "Skill ID to trigger (or null to stop)"
  - name: confidence
    type: float
    description: "Confidence score 0-1"

artifacts:
  storage_location: skills/out-04-follow-up-intelligence/outputs/
  filename_pattern: "out-04-follow-up-intelligence_{workflow_id}_{timestamp}.md"
  envelope_pattern: "out-04-follow-up-intelligence_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "outreach_analyzer_output"

metadata:
  generated_by: "E-9"
  tier: "B"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback
