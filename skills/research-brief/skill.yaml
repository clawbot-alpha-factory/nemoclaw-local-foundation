name: research-brief
version: 1.0.0
description: Takes a topic and produces a structured research brief with background, key findings, open questions, and recommendations.
author: Core88
created: 2026-03-23

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=1.1.0"
compatibility_notes: >
  Requires budget-enforcer.py v1.1+ for cheaper_claude and reasoning_claude aliases.
  Requires routing-config.yaml v1.1+ with cheaper_claude defined.

inputs:
  - name: topic
    type: string
    required: true
    description: The research topic to investigate
    validation:
      min_length: 5
      max_length: 500

  - name: depth
    type: string
    required: false
    default: standard
    description: Depth of research
    validation:
      allowed_values: [brief, standard, deep]

outputs:
  - name: brief
    type: string
    description: Structured research brief in markdown
    validation:
      min_length: 200
      must_contain_sections: [Background, Key Findings, Open Questions, Recommendations]

  - name: brief_file
    type: file_path
    description: Path to the written markdown artifact

artifacts:
  storage_location: skills/research-brief/outputs/
  filename_pattern: "research_brief_{workflow_id}_{timestamp}.md"
  format: markdown
  committed_to_repo: false
  gitignored: true
  resume_reads_prior_output: true
  prior_output_key: brief_file

steps:
  - id: step_1
    name: Validate Input and Plan Research
    step_type: local
    task_class: general_short
    description: Validate topic input and create a research plan with subtopics
    input_source: inputs.topic
    output_key: research_plan
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: research_plan
          op: not_empty
          right: true
      strategy: retry
      retry_count: 1
      fallback_step: null

  - id: step_2
    name: Deep Research on Topic
    step_type: llm
    task_class: complex_reasoning
    description: Deep research on the topic using reasoning model
    input_source: step_1.output.research_plan
    output_key: raw_research
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: raw_research
          op: not_empty
          right: true
      strategy: retry
      retry_count: 2
      fallback_step: null

  - id: step_3
    name: Structure Findings into Brief
    step_type: local
    task_class: moderate
    description: Structure raw research into Background, Key Findings, Open Questions, Recommendations
    input_source: step_2.output.raw_research
    output_key: structured_brief
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: structured_brief
          op: not_empty
          right: true
      strategy: retry
      retry_count: 1
      fallback_step: null

  - id: step_4
    name: Evaluate Research Brief Quality
    step_type: critic
    task_class: structured_short
    description: >
      Two-layer validation: deterministic checks (sections, length) + LLM quality scoring.
      Outputs JSON with quality_score 0-10.
    input_source: step_3.output.structured_brief
    output_key: step_4_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: step_4_output
          op: not_empty
          right: true
      strategy: retry
      retry_count: 1
      fallback_step: null
    transition:
      default: step_4b
      conditions:
        - left: step_4_output.quality_score
          op: ">="
          right: 10
          go_to: step_5
          reason: Quality score meets acceptance threshold
        - left: loop_counters.critic_loop
          op: ">="
          right: 5
          go_to: step_5
          reason: Maximum improvement iterations reached

  - id: step_4b
    name: Improve Research Brief Based on Critic Feedback
    step_type: llm
    task_class: complex_reasoning
    description: Revise brief using structured feedback from critic step
    input_source: step_4.output
    output_key: structured_brief
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      strategy: retry
      retry_count: 1
      fallback_step: step_5
    transition:
      default: step_4
      conditions: []

  - id: step_5
    name: Write artifact to output
    step_type: local
    task_class: general_short
    description: Write validated brief to markdown file in outputs directory
    input_source: step_4.output.validated_brief
    output_key: brief_file
    idempotency:
      rerunnable: false
      cached: false
      never_auto_rerun: true
    requires_human_approval: false
    failure:
      strategy: fallback
      fallback_step: null

validation:
  input:
    - rule: topic must be at least 5 characters
    - rule: topic must be at most 500 characters
    - rule: depth must be brief, standard, or deep if provided
  output:
    - rule: brief must be at least 200 characters
    - rule: brief must contain Background section
    - rule: brief must contain Key Findings section
    - rule: brief must contain Open Questions section
    - rule: brief must contain Recommendations section
  failure_conditions:
    - condition: input validation fails
      action: fail immediately with clear error message
    - condition: model returns empty response
      action: retry once — if retry fails set status to failed
    - condition: output validation fails
      action: pause with status failed — do not write artifact
    - condition: artifact write fails
      action: pause with status failed — preserve step_4 output in checkpoint

approval_boundaries:
  safe_steps: [step_1, step_2, step_3, step_4, step_4b, step_5]
  approval_gated_steps: []
  blocked_external_effect_steps: []
  notes: >
    v1 is fully local. No external writes, no API side effects beyond inference.
    Future versions that publish or send the brief must classify those steps as
    approval_gated or blocked_external.

routing:
  default_alias: complex_reasoning
  allow_override: false

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

final_output:
  select: highest_quality
  candidates:
    - key: structured_brief
      from_step: step_3
      score_from: step_4_output.quality_score
    - key: structured_brief
      from_step: step_4b
      score_from: step_4_output.quality_score
  fallback: structured_brief

critic_loop:
  enabled: true
  generator_step: step_3
  critic_step: step_4
  improve_step: step_4b
  score_field: step_4_output.quality_score
  acceptance_score: 10
  max_improvements: 5
  counter_name: critic_loop
  fallback_final_step: step_5

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 800
      max_length: 20000
      min_quality_score: 7
    sla:
      max_execution_seconds: 120
      max_cost_usd: 0.35
