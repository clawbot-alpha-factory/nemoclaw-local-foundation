name: k52-lead-enricher
version: 1.0.0
display_name: "Lead Enricher"
description: >
  Takes raw lead data and enriches with company info, decision-maker identification, and outreach recommendations.
author: NemoClaw Factory
created: 2026-03-31
language: en

family: K52
domain: K
tag: sales
skill_type: transformer

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 6

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are a B2B lead enrichment specialist. Enhance raw leads with actionable intelligence.

inputs:
  - name: lead_list
    type: string
    required: true
    description: "Raw lead data (names, companies, titles)"
    validation:
      min_length: 10
      max_length: 15000
  - name: enrichment_depth
    type: string
    required: false
    description: "Enrichment level: basic, standard, deep"
    validation:
      min_length: 5
      max_length: 10000
    default: "standard"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope for skill chaining"

artifacts:
  storage_location: skills/k52-lead-enricher/outputs/
  filename_pattern: "k52-lead-enricher_{workflow_id}_{timestamp}.md"
  envelope_pattern: "k52-lead-enricher_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse input and prepare analysis context"
    step_type: local
    task_class: general_short
    description: "Validate inputs, extract key parameters, prepare context for generation."
    input_source: inputs
    output_key: step_1_output
    failure:
      strategy: halt
      retry_count: 0

  - id: step_2
    name: "Generate primary output"
    step_type: llm
    task_class: moderate
    description: "Core generation step using execution_role persona."
    input_source: step_1.output
    output_key: generated_output
    failure:
      strategy: retry
      retry_count: 2

  - id: step_3
    name: "Evaluate output quality"
    step_type: critic
    task_class: moderate
    description: "Score output on relevance, completeness, and actionability."
    input_source: step_2.output
    output_key: step_3_output
    failure:
      strategy: fallback
      retry_count: 1
      fallback_step: step_5

  - id: step_5
    name: "Validate and write artifact"
    step_type: local
    task_class: general_short
    description: "Write markdown artifact and JSON envelope."
    input_source: __final_output__
    output_key: artifact_path
    failure:
      strategy: halt
      retry_count: 0

routing:
  default_alias: moderate
  allow_override: false

composable:
  output_type: "sales_transformer_output"
  can_feed_into: []
  accepts_input_from: []

metadata:
  generated_by: "skill-factory"
  factory_version: "E-5"
  quality_score: null
  approved_by: null
