name: rev-12-risk-capital-allocator
version: 1.0.0
display_name: "Risk & Capital Allocator"
description: >
  Allocates time, budget, API spend, outreach volume based on confidence, past success rates, current revenue. Prevents spam and budget waste. Sits above rev-06.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: A
tag: revenue
skill_type: orchestrator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 6

execution_role: >
  You are a risk management and capital allocation strategist. Make data-driven decisions about where to invest resources for maximum ROI with minimum risk.

inputs:
  - name: portfolio_state
    type: string
    required: true
    description: "Current campaigns, budgets, performance, available resources"
    validation:
      min_length: 20
      max_length: 15000
  - name: risk_tolerance
    type: string
    required: false
    description: "Risk tolerance: conservative, moderate, aggressive"
    validation:
      min_length: 5
      max_length: 10000
    default: "moderate"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/rev-12-risk-capital-allocator/outputs/
  filename_pattern: "rev-12-risk-capital-allocator_{workflow_id}_{timestamp}.md"
  envelope_pattern: "rev-12-risk-capital-allocator_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: premium

composable:
  output_type: "revenue_orchestrator_output"

metadata:
  generated_by: "E-9"
  tier: "A"
