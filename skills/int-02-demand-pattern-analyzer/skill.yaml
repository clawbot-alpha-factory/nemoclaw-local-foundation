name: int-02-demand-pattern-analyzer
version: 1.0.0
display_name: "Demand Pattern Analyzer"
description: >
  Clusters comments into pain points, desires, objections, confusion. Detects repeated problems, urgency signals, buying intent. Enforced output: insight + recommended_action + trigger_skill + confidence + demand_volume.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: F
tag: intelligence
skill_type: analyzer

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 6

execution_role: >
  You are a demand intelligence analyst. Identify patterns in raw market signals that reveal unmet needs and buying intent.

inputs:
  - name: raw_signals
    type: string
    required: true
    description: "Raw comments and signals from scraper"
    validation:
      min_length: 20
      max_length: 15000
  - name: niche
    type: string
    required: false
    description: "Market niche for context"
    validation:
      min_length: 5
      max_length: 10000
    default: "B2B SaaS automation"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

  - name: insight
    type: string
    description: "Key insight from analysis"
  - name: recommended_action
    type: string
    description: "Specific action to take"
  - name: trigger_skill
    type: string
    description: "Skill ID to trigger (or null to stop)"
  - name: confidence
    type: float
    description: "Confidence score 0-1"

artifacts:
  storage_location: skills/int-02-demand-pattern-analyzer/outputs/
  filename_pattern: "int-02-demand-pattern-analyzer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "int-02-demand-pattern-analyzer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: premium

composable:
  output_type: "intelligence_analyzer_output"

metadata:
  generated_by: "E-9"
  tier: "F"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback
