name: rev-08-agentic-service-packager
version: 1.0.0
display_name: "Agentic Service Packager"
description: >
  Packages NemoClaw capabilities as sellable services. Generates pricing, scope, deliverables, timeline for client proposals.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: A
tag: revenue
skill_type: generator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 8

execution_role: >
  You are a service design expert. Package AI automation capabilities into compelling, clearly-scoped service offerings with transparent pricing.

inputs:
  - name: capability_description
    type: string
    required: true
    description: "What the system can do for this client"
    validation:
      min_length: 20
      max_length: 10000
  - name: client_industry
    type: string
    required: false
    description: "Client's industry"
    validation:
      min_length: 5
      max_length: 10000
    default: "B2B SaaS"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/rev-08-agentic-service-packager/outputs/
  filename_pattern: "rev-08-agentic-service-packager_{workflow_id}_{timestamp}.md"
  envelope_pattern: "rev-08-agentic-service-packager_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: premium

composable:
  output_type: "revenue_generator_output"

metadata:
  generated_by: "E-9"
  tier: "A"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 800
      max_length: 20000
      min_quality_score: 7
    sla:
      max_execution_seconds: 120
      max_cost_usd: 0.35
