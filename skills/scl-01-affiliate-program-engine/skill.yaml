name: scl-01-affiliate-program-engine
version: 1.0.0
display_name: "Affiliate Program Engine"
description: >
  Designs affiliate program: commission structure, tracking, partner recruitment outreach, performance dashboard spec.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: E
tag: scale
skill_type: generator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 6

execution_role: >
  You are an affiliate program architect. Design programs that attract quality partners and scale revenue through referrals.

inputs:
  - name: product_context
    type: string
    required: true
    description: "Product/service details and target partners"
    validation:
      min_length: 20
      max_length: 5000
  - name: commission_model
    type: string
    required: false
    description: "Commission model preference"
    validation:
      min_length: 5
      max_length: 10000
    default: "recurring_20pct"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/scl-01-affiliate-program-engine/outputs/
  filename_pattern: "scl-01-affiliate-program-engine_{workflow_id}_{timestamp}.md"
  envelope_pattern: "scl-01-affiliate-program-engine_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "scale_generator_output"

metadata:
  generated_by: "E-9"
  tier: "E"

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 9.0
  max_iterations: 4
  escalation: retry_with_feedback
