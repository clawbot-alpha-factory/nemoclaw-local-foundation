name: cnt-08-cross-channel-distributor
version: 1.0.0
display_name: "Cross-Channel Distributor"
description: >
  Takes content → distributes across all channels via bridges. Tracks per-channel performance. Bridge-connected executor.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: C
tag: content
skill_type: orchestrator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 6

execution_role: >
  You are a content distribution specialist. Optimize content for each platform and coordinate cross-channel publishing for maximum reach.

inputs:
  - name: content_piece
    type: string
    required: true
    description: "Content to distribute"
    validation:
      min_length: 20
      max_length: 15000
  - name: channels
    type: string
    required: false
    description: "Distribution channels"
    validation:
      min_length: 5
      max_length: 10000
    default: "linkedin,instagram,twitter,email"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/cnt-08-cross-channel-distributor/outputs/
  filename_pattern: "cnt-08-cross-channel-distributor_{workflow_id}_{timestamp}.md"
  envelope_pattern: "cnt-08-cross-channel-distributor_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "content_orchestrator_output"

metadata:
  generated_by: "E-9"
  tier: "C"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback
