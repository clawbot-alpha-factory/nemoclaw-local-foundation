name: f09-pricing-strategist
version: 1.0.0
display_name: "Pricing Strategy Analyst"
description: >
  Takes a product/service description, target market, cost structure, and
  competitive context, produces a complete pricing strategy with model
  recommendation, tier/plan structure with specific price points, feature-to-tier
  mapping, grounded revenue projections, competitive positioning, risk analysis,
  and implementation recommendations. Works only from provided input — does not
  invent market data or reference external research unless provided.
author: Core88
created: 2026-03-26

family: F09
domain: F
tag: dual-use
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 8

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are a senior pricing strategist who produces precise, grounded pricing
  strategy documents. Every pricing recommendation is tied to provided input data.
  Every tier has a clear target audience, price point, and differentiated feature
  set. Revenue projections reference actual input numbers or clearly derived
  computations — never purely invented figures. When cost_structure is missing,
  you explicitly switch to value-based pricing. When making assumptions, you state
  them clearly and tie each assumption to the pricing logic it influences. You
  never reference external research unless it was explicitly provided in the input.

inputs:
  - name: product_description
    type: string
    required: true
    description: "What the product/service is, who it's for, core value proposition"
    validation:
      min_length: 30
      max_length: 20000

  - name: target_market
    type: string
    required: true
    description: "Who buys this: segments, size signals, willingness-to-pay context"
    validation:
      min_length: 20
      max_length: 10000

  - name: cost_structure
    type: string
    required: false
    default: ""
    description: "Fixed costs, variable costs per unit/user, infrastructure costs, margins"
    validation:
      max_length: 10000

  - name: competitive_context
    type: string
    required: false
    default: ""
    description: "Competitors, their pricing, market positioning, gaps"
    validation:
      max_length: 10000

  - name: pricing_goals
    type: string
    required: false
    default: ""
    description: "What pricing should optimize for: revenue maximization, market penetration, premium positioning, simplicity"
    validation:
      max_length: 5000

  - name: scope
    type: string
    required: false
    default: initial_launch
    description: "initial_launch (conservative, max 3 tiers), mature (full 3-5 tiers), pivot (repositioning existing pricing)"
    validation:
      allowed_values: [initial_launch, mature, pivot]

outputs:
  - name: result
    type: string
    description: "The complete pricing strategy document in markdown"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope"

artifacts:
  storage_location: skills/f09-pricing-strategist/outputs/
  filename_pattern: "f09-pricing-strategist_{workflow_id}_{timestamp}.md"
  envelope_pattern: "f09-pricing-strategist_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse product context and identify pricing dimensions"
    step_type: local
    task_class: general_short
    description: >
      Validate inputs. Extract pricing-relevant signals: B2B vs B2C, SaaS vs
      one-time, per-seat vs usage-based indicators. Detect cost inputs and
      competitive data presence. Classify scope. Flag if cost_structure is
      missing (triggers value-based pricing mode). Extract numeric tokens from
      cost_structure and target_market for grounding validation. Build
      generation plan.
    input_source: inputs.product_description
    output_key: step_1_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_1_output"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Input parsing failed"
    transition:
      default: step_2

  - id: step_2
    name: "Generate complete pricing strategy"
    step_type: llm
    task_class: complex_reasoning
    description: >
      Core generation. Produce full markdown pricing strategy with all required
      sections. Apply scope-driven generation rules. If cost_structure missing,
      use value-based pricing and state that explicitly. Each tier must include
      target audience and justification for why it exists. Higher tiers must
      include price anchoring logic. Revenue projections must reference input
      data or clearly derived computations.
    input_source: step_1.output
    output_key: generated_pricing
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "generated_pricing"
          op: "not_empty"
          right: true
        - left: "generated_pricing.length"
          op: ">="
          right: 500
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "Pricing strategy generation failed after 2 retries"
    transition:
      default: step_3

  - id: step_3
    name: "Evaluate pricing strategy completeness and analytical rigor"
    step_type: critic
    task_class: moderate
    description: >
      Two layers. Deterministic: required sections, pricing model named, tier
      structure with differentiation, revenue grounding against input data,
      competitive reference, pricing_goals addressed, anti-hallucination for
      research claims, assumptions quality, scope-specific rules, concrete
      pricing for initial_launch, pivot prior-state reference. LLM: strategic
      coherence, pricing psychology, risk completeness, tier justification.
    input_source: step_2.output
    output_key: step_3_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_3_output.quality_score"
          op: "not_empty"
          right: true
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Critic failed — using current output"
    transition:
      default: step_4
      conditions:
        - left: "step_3_output.quality_score"
          op: ">="
          right: 7
          go_to: step_5
          reason: "Score meets acceptance threshold"
        - left: "loop_counters.critic_loop"
          op: ">="
          right: 2
          go_to: step_5
          reason: "Max improvement attempts reached"

  - id: step_4
    name: "Strengthen pricing strategy based on critic feedback"
    step_type: llm
    task_class: complex_reasoning
    description: >
      Fix missing sections, strengthen tier justification, add risk analysis,
      ground projections in input data, differentiate tier features, add
      assumptions tied to pricing logic.
    input_source: step_3.output
    output_key: improved_pricing
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "improved_pricing"
          op: "not_empty"
          right: true
        - left: "improved_pricing.length"
          op: ">="
          right: 500
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Improvement failed — using previous best output"
    transition:
      default: step_3

  - id: step_5
    name: "Validate final pricing strategy and write artifact"
    step_type: local
    task_class: general_short
    description: >
      Full deterministic gate. Hard-fail on critical violations.
    input_source: __final_output__
    output_key: artifact_path
    idempotency:
      rerunnable: false
      cached: false
      never_auto_rerun: true
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "artifact_path"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Final pricing strategy validation or artifact write failed"
    transition:
      default: __end__

final_output:
  select: latest
  candidates:
    - key: generated_pricing
      from_step: step_2
      score_from: step_3_output.quality_score
    - key: improved_pricing
      from_step: step_4
      score_from: step_3_output.quality_score
  fallback: generated_pricing

critic_loop:
  enabled: true
  generator_step: step_2
  critic_step: step_3
  improve_step: step_4
  score_field: step_3_output.quality_score
  acceptance_score: 10
  max_improvements: 5
  counter_name: critic_loop
  fallback_final_step: step_5

observability:
  log_level: detailed
  track_cost: true
  track_latency: true
  track_tokens: true
  track_quality: true
  metrics_file: "~/.nemoclaw/logs/skill-metrics.jsonl"

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 1500
      max_length: 80000
      min_quality_score: 7
    sla:
      max_execution_seconds: 120
      max_cost_usd: 0.15

  declarative_guarantees:
    - "Pricing model is explicitly named and justified"
    - "Every tier has name, price, differentiated features, target audience, and justification"
    - "Revenue projections reference input data or clearly derived computations, not invented figures"
    - "If cost_structure missing, explicitly uses value-based pricing"
    - "Competitive positioning addresses provided competitors when competitive_context given"
    - "Risks are specific, not generic"
    - "Each assumption relates to pricing logic and influences at least one output section"
    - "For initial_launch scope: at least one tier has a concrete numeric price point"
    - "For pivot scope: references prior state explicitly"

approval_boundaries:
  safe_steps: [step_1, step_2, step_3, step_4, step_5]
  approval_gated_steps: []
  blocked_external_effect_steps: []

routing:
  default_alias: complex_reasoning
  allow_override: false

composable:
  output_type: "pricing_strategy"
  can_feed_into:
    - "d11-copywriting-specialist"
    - "j36-biz-idea-validator"
  accepts_input_from:
    - "f09-product-req-writer"
    - "e12-market-research-analyst"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0
