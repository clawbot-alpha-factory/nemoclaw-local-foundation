name: scl-09-niche-domination-engine
version: 1.0.0
display_name: "Niche Domination Engine"
description: >
  Picks niche from demand signals. Floods content, outreach, comments, partnerships simultaneously. Builds authority fast. Strategy: compress 6 months of presence into 2 weeks.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: G
tag: scale
skill_type: orchestrator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 6

execution_role: >
  You are a market domination strategist. Design and execute blitz campaigns that establish authority in a niche faster than any human team could.

inputs:
  - name: niche_definition
    type: string
    required: true
    description: "Target niche with demand data and competitive landscape"
    validation:
      min_length: 20
      max_length: 10000
  - name: timeline
    type: string
    required: false
    description: "Domination timeline"
    validation:
      min_length: 5
      max_length: 10000
    default: "14_days"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/scl-09-niche-domination-engine/outputs/
  filename_pattern: "scl-09-niche-domination-engine_{workflow_id}_{timestamp}.md"
  envelope_pattern: "scl-09-niche-domination-engine_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: premium

composable:
  output_type: "scale_orchestrator_output"

metadata:
  generated_by: "E-9"
  tier: "G"

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 9.0
  max_iterations: 4
  escalation: retry_with_feedback
