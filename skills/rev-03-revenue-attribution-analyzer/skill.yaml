name: rev-03-revenue-attribution-analyzer
version: 1.0.0
display_name: "Revenue Attribution Analyzer"
description: >
  Maps every dollar to source: channel, message, agent action. Outputs ROI per channel. Enforced output: insight + recommended_action + trigger_skill.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: A
tag: revenue
skill_type: analyzer

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 6

execution_role: >
  You are a revenue attribution analyst. Trace every conversion back to its origin with multi-touch attribution modeling.

inputs:
  - name: revenue_data
    type: string
    required: true
    description: "Revenue events with source tracking data"
    validation:
      min_length: 20
      max_length: 15000
  - name: period
    type: string
    required: false
    description: "Analysis period"
    validation:
      min_length: 5
      max_length: 10000
    default: "last_30_days"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

  - name: insight
    type: string
    description: "Key insight from analysis"
  - name: recommended_action
    type: string
    description: "Specific action to take"
  - name: trigger_skill
    type: string
    description: "Skill ID to trigger (or null to stop)"
  - name: confidence
    type: float
    description: "Confidence score 0-1"

artifacts:
  storage_location: skills/rev-03-revenue-attribution-analyzer/outputs/
  filename_pattern: "rev-03-revenue-attribution-analyzer_{workflow_id}_{timestamp}.md"
  envelope_pattern: "rev-03-revenue-attribution-analyzer_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "revenue_analyzer_output"

metadata:
  generated_by: "E-9"
  tier: "A"

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 9.0
  max_iterations: 4
  escalation: retry_with_feedback
