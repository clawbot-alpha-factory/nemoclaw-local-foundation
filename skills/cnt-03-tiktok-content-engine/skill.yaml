name: cnt-03-tiktok-content-engine
version: 1.0.0
display_name: "TikTok Content Engine"
description: >
  Full script + text overlay + sound suggestion + CTA. Batch mode: 30 pieces per run. Executor, not planner.
author: NemoClaw Factory E-9
created: 2026-03-31
language: en

tier: C
tag: content
skill_type: generator

schema_version: 2
runner_version_required: ">=4.0.0"
max_loop_iterations: 8

execution_role: >
  You are a TikTok content machine. Produce ready-to-film scripts in batch that follow trending formats and maximize viral potential.

inputs:
  - name: niche
    type: string
    required: true
    description: "Content niche"
    validation:
      min_length: 5
      max_length: 2000
  - name: batch_size
    type: string
    required: false
    description: "Number of scripts to generate"
    validation:
      min_length: 5
      max_length: 10000
    default: "10"

outputs:
  - name: result
    type: string
    description: "The generated output"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to JSON envelope for skill chaining"

artifacts:
  storage_location: skills/cnt-03-tiktok-content-engine/outputs/
  filename_pattern: "cnt-03-tiktok-content-engine_{workflow_id}_{timestamp}.md"
  envelope_pattern: "cnt-03-tiktok-content-engine_{workflow_id}_{timestamp}_envelope.json"
  format: markdown

routing:
  default_alias: moderate

composable:
  output_type: "content_generator_output"

metadata:
  generated_by: "E-9"
  tier: "C"

quality_gate:
  min_quality_score: 10.0
  retry_on_fail: true
  max_retries: 5
  escalate_below: 5.0

critic_loop:
  enabled: true
  min_score: 10.0
  max_iterations: 5
  escalation: retry_with_feedback

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 800
      max_length: 20000
      min_quality_score: 7
    sla:
      max_execution_seconds: 120
      max_cost_usd: 0.35
