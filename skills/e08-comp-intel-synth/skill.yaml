name: e08-comp-intel-synth
version: 1.0.0
display_name: "Competitive Intelligence Synthesizer"
description: >
  Takes competitor data, industry context, and focus areas, produces structured
  competitive intelligence reports with SWOT analysis, market positioning, and
  prioritized strategic recommendations. Works only from provided data — no
  external knowledge, no web access, no fabrication.
author: Core88
created: 2026-03-26

family: F08
domain: E
tag: dual-use
skill_type: executor

schema_version: 2
runner_version_required: ">=4.0.0"
routing_system_version_required: ">=3.0.0"
max_loop_iterations: 6

context_requirements:
  - workflow_id
  - budget_state
  - step_history

execution_role: >
  You are a senior competitive intelligence analyst with expertise in market
  research, strategic analysis frameworks (SWOT, Porter's Five Forces), and
  executive-level report writing. You synthesize ONLY the data provided to you
  into clear, actionable intelligence. You never fabricate statistics, invent
  market data, or use knowledge beyond what is explicitly given in the input.
  When data is insufficient, you state this explicitly rather than guessing.

inputs:
  - name: competitor_data
    type: string
    required: true
    description: "Raw competitor information: names, products, pricing, funding, team, news, position"
    validation:
      min_length: 50
      max_length: 50000

  - name: focus_company
    type: string
    required: true
    description: "The company whose competitive position is being analyzed"
    validation:
      min_length: 1
      max_length: 200

  - name: industry_context
    type: string
    required: true
    description: "Industry vertical, market segment, macro context"
    validation:
      min_length: 10
      max_length: 5000

  - name: analysis_priorities
    type: string
    required: false
    default: "General competitive landscape with balanced coverage"
    description: "Specific strategic questions or focus areas to address"
    validation:
      max_length: 5000

  - name: report_depth
    type: string
    required: false
    default: standard
    description: "Report depth: brief (1-2 pages), standard (3-5 pages), comprehensive (5-10 pages)"
    validation:
      allowed_values: [brief, standard, comprehensive]

outputs:
  - name: result
    type: string
    description: "The structured competitive intelligence report"
  - name: result_file
    type: file_path
    description: "Path to the markdown artifact"
  - name: envelope_file
    type: file_path
    description: "Path to the JSON envelope"

artifacts:
  storage_location: skills/e08-comp-intel-synth/outputs/
  filename_pattern: "e08-comp-intel-synth_{workflow_id}_{timestamp}.md"
  envelope_pattern: "e08-comp-intel-synth_{workflow_id}_{timestamp}_envelope.json"
  format: markdown
  committed_to_repo: false
  gitignored: true

steps:
  - id: step_1
    name: "Parse competitor data and structure analysis inputs"
    step_type: local
    task_class: general_short
    description: >
      Validate inputs, extract competitor names, extract factual tokens
      (numbers, percentages, currency, dates) for later preservation check,
      detect data completeness, flag missing data areas, prepare structured
      brief for LLM.
    input_source: inputs.competitor_data
    output_key: step_1_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_1_output"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Input parsing failed — invalid or insufficient competitor data"
    transition:
      default: step_2

  - id: step_2
    name: "Generate competitive intelligence report"
    step_type: llm
    task_class: premium
    description: >
      Core analysis: produce structured markdown report with required sections.
      Explicitly forbidden from using external knowledge. Must state data gaps
      instead of guessing. Depth controlled by report_depth input.
    input_source: step_1.output
    output_key: generated_report
    idempotency:
      rerunnable: true
      cached: true
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "generated_report"
          op: "not_empty"
          right: true
        - left: "generated_report.length"
          op: ">="
          right: 500
      strategy: retry
      retry_count: 2
      fallback_step: null
      escalation_message: "Report generation failed after 2 retries"
    transition:
      default: step_3

  - id: step_3
    name: "Evaluate report quality and analytical rigor"
    step_type: critic
    task_class: moderate
    description: >
      Two layers. Deterministic: required sections present and non-empty,
      SWOT structured as lists, competitor coverage (each has analytical
      statement), factual token preservation. LLM: analytical depth,
      recommendation grounding, anti-hallucination for SWOT.
    input_source: step_2.output
    output_key: step_3_output
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "step_3_output.quality_score"
          op: "not_empty"
          right: true
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Critic failed — using current output"
    transition:
      default: step_4
      conditions:
        - left: "step_3_output.quality_score"
          op: ">="
          right: 7
          go_to: step_5
          reason: "Score meets acceptance threshold"
        - left: "loop_counters.critic_loop"
          op: ">="
          right: 2
          go_to: step_5
          reason: "Max improvement attempts reached"

  - id: step_4
    name: "Strengthen report based on critic feedback"
    step_type: llm
    task_class: premium
    description: >
      Fix weak analysis, add missing competitor coverage, strengthen
      recommendations with SWOT grounding. Loops back to step_3.
    input_source: step_3.output
    output_key: improved_report
    idempotency:
      rerunnable: true
      cached: false
      never_auto_rerun: false
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "improved_report"
          op: "not_empty"
          right: true
        - left: "improved_report.length"
          op: ">="
          right: 500
      strategy: fallback
      retry_count: 1
      fallback_step: step_5
      escalation_message: "Improvement failed — using previous best output"
    transition:
      default: step_3

  - id: step_5
    name: "Validate final report and write artifact"
    step_type: local
    task_class: general_short
    description: >
      Full deterministic gate: required sections, competitor coverage,
      SWOT structure, factual token preservation. Hard-fail on violations.
    input_source: __final_output__
    output_key: artifact_path
    idempotency:
      rerunnable: false
      cached: false
      never_auto_rerun: true
    requires_human_approval: false
    failure:
      success_conditions:
        - left: "artifact_path"
          op: "not_empty"
          right: true
      strategy: halt
      retry_count: 0
      fallback_step: null
      escalation_message: "Final report validation or artifact write failed"
    transition:
      default: __end__

final_output:
  select: latest
  candidates:
    - key: generated_report
      from_step: step_2
      score_from: step_3_output.quality_score
    - key: improved_report
      from_step: step_4
      score_from: step_3_output.quality_score
  fallback: generated_report

critic_loop:
  enabled: true
  generator_step: step_2
  critic_step: step_3
  improve_step: step_4
  score_field: step_3_output.quality_score
  acceptance_score: 7
  max_improvements: 2
  counter_name: critic_loop
  fallback_final_step: step_5

observability:
  log_level: detailed
  track_cost: true
  track_latency: true
  track_tokens: true
  track_quality: true
  metrics_file: "~/.nemoclaw/logs/skill-metrics.jsonl"

contracts:
  machine_validated:
    output_format: markdown
    required_fields:
      - result
    quality:
      min_length: 1000
      max_length: 80000
      min_quality_score: 7
    sla:
      max_execution_seconds: 120
      max_cost_usd: 0.15

  declarative_guarantees:
    - "Every competitor from input data is covered with at least one analytical statement"
    - "SWOT elements are grounded in provided input data; assumptions and data gaps are explicitly stated"
    - "Strategic recommendations are linked to specific SWOT or positioning insights"
    - "No fabricated statistics or claims not present in the input data"
    - "Report depth matches the requested level"
    - "Analysis priorities are explicitly addressed if provided"
    - "Data gaps are surfaced in the report rather than filled with guesses"

approval_boundaries:
  safe_steps: [step_1, step_2, step_3, step_4, step_5]
  approval_gated_steps: []
  blocked_external_effect_steps: []
  notes: >
    All steps are safe — no external writes, no web access, no API calls
    beyond inference.

routing:
  default_alias: complex_reasoning
  allow_override: false

composable:
  output_type: "competitive_intelligence_report"
  can_feed_into:
    - "f16-gtm-plan-writer"
    - "f18-sales-pitch-crafter"
    - "f09-product-req-writer"
  accepts_input_from: []

quality_gate:
  min_quality_score: 9.0
  retry_on_fail: true
  max_retries: 4
  escalate_below: 5.0
