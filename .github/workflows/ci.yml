name: NemoClaw CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Fast gate — syntax + policy (no deps) ────────────────────────
  policy-check:
    name: Policy & Syntax Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: pip install pyyaml

      - name: Syntax check (all Python files)
        run: |
          find . -name "*.py" \
            -not -path "./.venv*" \
            -not -path "./tools/fish-speech/*" \
            -not -path "./tools/capcut-api/*" \
            -not -path "./.cc2-backup*/*" \
            -not -path "./node_modules/*" \
            | xargs python3 -c "
          import ast, sys
          errors = 0
          for f in sys.argv[1:]:
              try:
                  ast.parse(open(f).read())
              except SyntaxError as e:
                  print(f'SYNTAX ERROR: {f}:{e.lineno} — {e.msg}')
                  errors += 1
          if errors:
              print(f'{errors} syntax errors found')
              sys.exit(1)
          print(f'Syntax check: {len(sys.argv)-1} files, 0 errors')
          "

      - name: CI policy checks
        run: python3 scripts/ci_policy_check.py

  # ── Stage 2: Validation suite (31 checks) ────────────────────────────────
  validate:
    name: 31-Check Validation
    runs-on: ubuntu-latest
    needs: policy-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install core deps
        run: |
          pip install \
            pyyaml \
            pydantic>=2.9 \
            langchain-core>=0.3 \
            langchain-anthropic>=0.3 \
            langchain-openai>=0.3 \
            langchain-google-genai>=4.0 \
            langgraph>=0.3 \
            httpx>=0.28 \
            requests>=2.31

      - name: Run validation suite
        run: python3 scripts/validate.py --ci
        env:
          # Provide stub keys so imports succeed without real calls
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'ci-stub' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'ci-stub' }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'ci-stub' }}

  # ── Stage 3: Integration tests (MA systems) ───────────────────────────────
  integration:
    name: MA-20 Integration Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install core deps
        run: |
          pip install \
            pyyaml \
            pydantic>=2.9 \
            langchain-core>=0.3 \
            langchain-anthropic>=0.3 \
            langchain-openai>=0.3 \
            langchain-google-genai>=4.0 \
            langgraph>=0.3 \
            httpx>=0.28 \
            requests>=2.31 \
            cryptography>=44.0

      - name: Run integration tests (summary)
        run: python3 scripts/integration_test.py --summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'ci-stub' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'ci-stub' }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'ci-stub' }}

  # ── Stage 4: Backend Docker build smoke test ──────────────────────────────
  docker-build:
    name: Docker Build (Backend)
    runs-on: ubuntu-latest
    needs: policy-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: command-center/backend/Dockerfile
          push: false
          tags: nemoclaw-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 5: Frontend type-check + lint ───────────────────────────────────
  frontend-check:
    name: Frontend Typecheck & Lint
    runs-on: ubuntu-latest
    needs: policy-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: command-center/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: command-center/frontend
        run: npm ci

      - name: Type-check (tsc --noEmit)
        working-directory: command-center/frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: command-center/frontend
        run: npm run lint
