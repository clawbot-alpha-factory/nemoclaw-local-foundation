skills:

  - id: k40-deal-qualifier
    display_name: "Deal Qualifier (MEDDPICC)"
    family: K40
    domain: K
    tag: sales-qualification
    skill_type: analyzer
    framework: FW-001
    assigned_agent: growth_revenue_lead
    status: registered
    description: >
      Scores deals across all 8 MEDDPICC dimensions (Metrics, Economic Buyer,
      Decision Criteria, Decision Process, Paper Process, Identify Pain,
      Champion, Competition). Produces qualification report with scores,
      red flags, zone classification (strong/at-risk/weak), and prioritized
      next-action recommendations.
    inputs:
      - deal_description (string, required, 50-15000 chars)
      - deal_stage (enum: prospecting/discovery/evaluation/negotiation/closing, default: discovery)
      - deal_value (string, optional)
      - output_depth (enum: overview/strategic/detailed, default: strategic)
    output_type: deal_qualification_report
    routing: premium
    contracts:
      min_length: 500
      max_cost_usd: 0.15
      max_execution_seconds: 120
      min_quality_score: 7
    composable:
      feeds_into: [k43-pipeline-analyzer, k47-account-expansion-planner, h30-cold-email-writer]
      accepts_from: [c09-market-analyst, j36-biz-idea-validator]
    declarative_guarantees:
      - "All 8 MEDDPICC dimensions scored 1-10 with evidence"
      - "Total score computed out of 80"
      - "Zone classification: strong >=60, at-risk 40-59 or zero in M/EB/IP/CH, weak <40"
      - "Red flags surfaced per dimension"
      - "Missing information flagged as gaps, not scored generously"

