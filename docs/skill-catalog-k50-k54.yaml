skills:

  - id: k50-web-researcher
    display_name: "Web Deep Researcher"
    family: K50
    domain: K
    tag: web-research
    skill_type: analyzer
    framework: null
    assigned_agent: intelligence_research_lead
    status: registered
    description: >
      Navigates any URL, extracts page content via PinchTab text extraction,
      then analyzes the content with LLM to produce structured research output.
      Supports multi-page crawling (up to 5 pages), content summarization,
      key fact extraction, and source quality assessment.
    pinchtab_actions: [navigate, text, snapshot, scroll]
    inputs:
      - url (string, required)
      - research_question (string, required, 10-2000 chars)
      - max_pages (integer, default: 3, max: 5)
      - output_depth (enum: overview/strategic/detailed, default: strategic)
    output_type: web_research_report
    routing: premium
    contracts:
      min_length: 500
      max_cost_usd: 0.20
      max_execution_seconds: 180
      min_quality_score: 7
    composable:
      feeds_into: [c09-market-analyst, k44-content-strategy-planner, k51-competitor-scraper]
      accepts_from: [c09-market-analyst, j36-biz-idea-validator]
    declarative_guarantees:
      - "All extracted content is sourced from navigated URLs"
      - "Source URLs and page titles included in output"
      - "Content extraction uses PinchTab text mode (~800 tokens/page)"
      - "Multi-page crawling respects max_pages limit"
      - "No fabricated information — only what was found on the pages"
    governance:
      access_control: [navigate, text]
      cost_tracking: true
      human_approval: false
      behavior_rules: [never_submit_payment]

  - id: k51-competitor-scraper
