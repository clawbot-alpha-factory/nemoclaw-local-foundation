    domain: K
    tag: competitive-intelligence
    skill_type: analyzer
    framework: null
    assigned_agent: intelligence_research_lead
    status: registered
    description: >
      Extracts competitor pricing, features, positioning, and messaging from
      their public website. Uses PinchTab snapshot for interactive element
      detection and text extraction for content. Produces structured competitive
      analysis with feature comparison matrix.
    pinchtab_actions: [navigate, snapshot, text, scroll, click]
    inputs:
      - competitor_url (string, required)
      - our_product (string, required, 50-5000 chars)
      - focus_areas (multi-enum: pricing/features/positioning/messaging/team, default: [pricing, features, positioning])
      - output_depth (enum: overview/strategic/detailed, default: strategic)
    output_type: competitor_intelligence_report
    routing: premium
    contracts:
      min_length: 500
      max_cost_usd: 0.20
      max_execution_seconds: 180
      min_quality_score: 7
    composable:
      feeds_into: [k40-deal-qualifier, k44-content-strategy-planner, c09-market-analyst]
      accepts_from: [c09-market-analyst, k50-web-researcher]
    declarative_guarantees:
      - "All data sourced from competitor's public website only"
      - "Pricing extracted where publicly listed"
      - "Feature comparison matrix included"
      - "Positioning analysis based on actual messaging found"
      - "No assumptions about non-public information"
    governance:
      access_control: [navigate, text, click]
      cost_tracking: true
      human_approval: false
      behavior_rules: [never_submit_payment, never_delete_production_data]

