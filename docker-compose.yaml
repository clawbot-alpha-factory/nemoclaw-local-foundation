# NemoClaw Local Foundation — Docker Compose
# Usage: docker compose up -d

services:
  backend:
    build:
      context: .
      dockerfile: command-center/backend/Dockerfile
    ports:
      - "8100:8100"
    volumes:
      - nemoclaw-data:/root/.nemoclaw
      - ./config:/app/config:ro
    env_file:
      - config/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: command-center/frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8100

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: nemoclaw
      MINIO_ROOT_PASSWORD: nemoclaw-dev
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nemoclaw-data:
  minio-data:
